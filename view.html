<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sammed ❤️ Sahana</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;500;600&display=swap');

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter;
  background:#0b0b0f;
  color:white;
}

/* HEADER */
header{
  padding:14px;
  text-align:center;
  font-weight:700;
  background:rgba(0,0,0,0.8);
  position:sticky;
  top:0;
  z-index:10;
}

/* STORY CARDS HOME */
.story-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:14px;
  padding:14px;
}

.story-card{
  height:140px;
  border-radius:18px;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  transform:scale(1);
  transition:.3s;
}

.story-card:hover{
  transform:scale(1.02);
}

.story-card img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.6);
}

.story-title{
  position:absolute;
  bottom:12px;
  left:12px;
  font-size:18px;
  font-weight:700;
}

/* FULL SECTION */
.section{
  display:none;
  padding:10px;
}

.section.active{
  display:block;
  animation:fade .5s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* IMAGE GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.card{
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

/* TOP BACK BUTTON */
.back{
  position:sticky;
  top:60px;
  padding:10px;
  background:rgba(0,0,0,0.8);
  border:none;
  color:white;
  width:100%;
  text-align:left;
  font-weight:600;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.popup img{
  max-width:92%;
  border-radius:12px;
}
</style>
</head>

<body>

<header>💍 Sammed ❤️ Sahana</header>

<!-- HOME STORIES -->
<div id="home" class="story-grid"></div>

<!-- SECTIONS -->
<div id="sections"></div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCPVPeU7f8kBBJlcq-WURC2YT5rRQoYFVo",
  authDomain:"ss-wedding-e527d.firebaseapp.com",
  projectId:"ss-wedding-e527d"
});

const db=getFirestore(app);

let data={
  home:[],
  haldi:[],
  mehendi:[],
  wedding:[],
  reception:[]
};

const titles={
  haldi:"Haldi 🌼",
  mehendi:"Mehendi 💚",
  wedding:"Wedding 💍",
  reception:"Reception 🎉"
};

/* LOAD */
async function load(){
  const snap=await getDoc(doc(db,"wedding","album"));

  if(snap.exists() && snap.data()?.data){
    data=JSON.parse(snap.data().data);
  }

  renderHome();

  setTimeout(()=>{
    document.getElementById("music").play();
  },1500);
}

/* HOME STORY UI */
function renderHome(){
  const home=document.getElementById("home");
  home.innerHTML="";

  Object.keys(data).forEach(k=>{
    if(k==="home") return;

    const div=document.createElement("div");
    div.className="story-card";
    div.onclick=()=>openSection(k);

    div.innerHTML=`
      <img src="${data[k][0] || ''}">
      <div class="story-title">${titles[k]}</div>
    `;

    home.appendChild(div);
  });
}

/* OPEN SECTION */
function openSection(key){
  document.getElementById("home").style.display="none";

  const sec=document.getElementById("sections");
  sec.innerHTML="";

  const wrap=document.createElement("div");
  wrap.className="section active";

  wrap.innerHTML=`
    <button class="back" onclick="goBack()">← Back</button>
    <div class="grid">
      ${(data[key]||[]).map(i=>`
        <div class="card" onclick="openImg('${i}')">
          <img src="${i}">
        </div>
      `).join("")}
    </div>
  `;

  sec.appendChild(wrap);
}

/* BACK */
window.goBack=function(){
  document.getElementById("sections").innerHTML="";
  document.getElementById("home").style.display="grid";
};

/* IMAGE */
window.openImg=function(src){
  const d=document.createElement("div");
  d.className="popup";
  d.innerHTML=`<img src="${src}">`;
  d.onclick=()=>d.remove();
  document.body.appendChild(d);
};

load();
</script>

</body>
</html>
