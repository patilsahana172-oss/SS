<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sammed ❤️ Sahana</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap');

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* 🎬 CINEMATIC TEASER */
#intro{
  position:fixed;
  inset:0;
  z-index:9999;
  overflow:hidden;
  background:black;
}

#intro video{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.45) contrast(1.1);
  transform:scale(1.05);
}

/* cinematic overlay */
#intro::after{
  content:"";
  position:absolute;
  inset:0;
  background:
    radial-gradient(circle at center, transparent 20%, rgba(0,0,0,0.7) 80%),
    linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

/* TEXT ANIMATION */
.intro-text{
  position:absolute;
  bottom:18%;
  width:100%;
  text-align:center;
  z-index:2;
  animation:fadeUp 2s ease;
}

.intro-text h1{
  font-family:'Playfair Display';
  font-size:26px;
  letter-spacing:1px;
}

.intro-text p{
  color:#ff4d6d;
  margin-top:6px;
}

/* HEADER */
header{
  padding:14px;
  text-align:center;
  font-family:'Playfair Display';
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  position:sticky;
  top:0;
  z-index:10;
  border-bottom:1px solid rgba(255,255,255,0.08);
}

/* HERO */
.hero{
  margin:12px;
  height:180px;
  border-radius:18px;
  overflow:hidden;
  position:relative;
  background:url('https://images.unsplash.com/photo-1523438097201-512ae7d59c0b?q=80') center/cover;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);
}

.hero-text{
  position:absolute;
  bottom:12px;
  left:12px;
  font-family:'Playfair Display';
}

/* INVITE */
.invite{
  margin:12px;
  padding:16px;
  border-radius:16px;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,0.08);
  text-align:center;
}

.invite h2{
  margin:0;
  color:#ff4d6d;
  font-family:'Playfair Display';
}

/* NAV */
.nav{
  display:flex;
  gap:10px;
  padding:10px;
  overflow-x:auto;
  background:rgba(255,255,255,0.03);
  position:sticky;
  top:0;
  z-index:9;
}

.nav button{
  border:none;
  padding:10px 14px;
  border-radius:999px;
  background:transparent;
  color:#aaa;
}

.nav button.active{
  color:#fff;
}

/* PAGE */
.page{
  display:none;
  padding:12px;
}

.page.active{
  display:block;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

/* CARD */
.card{
  border-radius:14px;
  overflow:hidden;
  background:rgba(255,255,255,0.05);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.popup img{
  max-width:92%;
  border-radius:16px;
}

/* ANIMATION */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<!-- 🎬 AUTO CINEMATIC TEASER -->
<div id="intro">
  <video id="video" autoplay muted playsinline>
    <source src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4">
  </video>

  <div class="intro-text">
    <h1>💍 A Love Story Begins</h1>
    <p>Sammed ❤️ Sahana</p>
  </div>
</div>

<header>💍 Sammed ❤️ Sahana</header>

<div class="hero">
  <div class="hero-text">Wedding Journey ✨</div>
</div>

<div class="invite">
  <h2>Wedding Invitation 💖</h2>
  <p>June 22 • Terdal</p>
</div>

<div class="nav" id="nav"></div>
<div id="content"></div>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCPVPeU7f8kBBJlcq-WURC2YT5rRQoYFVo",
  authDomain:"ss-wedding-e527d.firebaseapp.com",
  projectId:"ss-wedding-e527d"
});

const db=getFirestore(app);

let data={home:[],haldi:[],mehendi:[],wedding:[],reception:[]};
let current="home";

const titles={
  home:"Home",
  haldi:"Haldi 🌼",
  mehendi:"Mehendi 💚",
  wedding:"Wedding 💍",
  reception:"Reception 🎉"
};

const label=k=>titles[k]||k;

/* LOAD */
async function load(){
  const snap=await getDoc(doc(db,"wedding","album"));
  if(snap.exists() && snap.data()?.data){
    data=JSON.parse(snap.data().data);
  }

  render();

  /* 🎬 AUTO TEASER EXIT */
  setTimeout(()=>{
    document.getElementById("intro").style.opacity="0";
    document.getElementById("intro").style.transition="1.5s";
    setTimeout(()=>{
      document.getElementById("intro").style.display="none";
      document.getElementById("music").play();
    },1500);
  },4500);
}

/* NAV */
function nav(){
  const n=document.getElementById("nav");
  n.innerHTML="";

  Object.keys(data).forEach(k=>{
    const b=document.createElement("button");
    b.textContent=label(k);
    if(k===current) b.classList.add("active");

    b.onclick=()=>{
      current=k;
      render();
    };

    n.appendChild(b);
  });
}

/* CONTENT */
function content(){
  const c=document.getElementById("content");
  c.innerHTML="";

  Object.keys(data).forEach(k=>{
    const d=document.createElement("div");
    d.className=`page ${k===current?'active':''}`;

    d.innerHTML=`
      <div class="grid">
        ${(data[k]||[]).map(i=>`
          <div class="card" onclick="openImg('${i}')">
            <img src="${i}">
          </div>
        `).join("")}
      </div>
    `;

    c.appendChild(d);
  });
}

function render(){
  nav();
  content();
}

/* IMAGE POPUP */
window.openImg=(src)=>{
  const d=document.createElement("div");
  d.className="popup";
  d.innerHTML=`<img src="${src}">`;
  d.onclick=()=>d.remove();
  document.body.appendChild(d);
};

load();
</script>

</body>
</html>
