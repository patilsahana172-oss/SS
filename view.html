<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sammed ❤️ Sahana</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;500;600&display=swap');

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter;
  background:#050507;
  color:white;
  overflow-x:hidden;
}

/* 🎬 TEASER INTRO (NEW IMPORTANT PART) */
#teaser{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:99999;
}

.teaser-title{
  font-family:'Playfair Display';
  font-size:2.2rem;
  opacity:0;
  animation:fadeIn 2s ease forwards;
}

.teaser-sub{
  margin-top:10px;
  color:#fda4af;
  opacity:0;
  animation:fadeIn 2s ease 1.5s forwards;
}

.teaser-line{
  margin-top:12px;
  font-size:14px;
  opacity:0;
  animation:fadeIn 2s ease 2.2s forwards;
  color:#fff;
}

@keyframes fadeIn{
  from{opacity:0;transform:scale(1.2)}
  to{opacity:1;transform:scale(1)}
}

/* 🌸 MAIN APP */
header{
  padding:14px;
  text-align:center;
  font-family:'Playfair Display';
  font-size:20px;
  background:rgba(0,0,0,0.6);
  position:sticky;
  top:0;
  z-index:10;
}

/* HERO */
.hero{
  margin:12px;
  height:180px;
  border-radius:18px;
  background:url('https://images.unsplash.com/photo-1523438097201-512ae7d59c0b?q=80') center/cover;
  position:relative;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.85),transparent);
}

.hero-text{
  position:absolute;
  bottom:12px;
  left:12px;
  font-family:'Playfair Display';
}

/* INVITE */
.invite{
  margin:12px;
  padding:18px;
  border-radius:16px;
  background:linear-gradient(135deg,#fff,#ffe4e6);
  color:#111;
  text-align:center;
}

.invite h1{
  font-family:'Playfair Display';
  color:#e11d48;
}

/* NAV */
.nav{
  display:flex;
  gap:10px;
  padding:10px;
  overflow-x:auto;
  background:rgba(0,0,0,0.85);
  position:sticky;
  top:0;
  z-index:9;
}

.nav button{
  border:none;
  padding:10px 14px;
  border-radius:999px;
  background:#1c1c2a;
  color:white;
}

.nav button.active{
  background:#e11d48;
}

/* PAGE */
.page{display:none}
.page.active{display:block;animation:fade .4s ease}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* TITLE */
.title{
  padding:10px 12px;
  color:#fda4af;
  font-family:'Playfair Display';
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:12px;
}

@media(min-width:600px){
  .grid{grid-template-columns:repeat(3,1fr);}
}

/* CARD */
.card{
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
  cursor:pointer;
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.popup img{
  max-width:92%;
  border-radius:12px;
}
</style>
</head>

<body>

<!-- 🎬 TEASER INTRO -->
<div id="teaser">
  <div class="teaser-title">Sammed ❤️ Sahana</div>
  <div class="teaser-sub">A Love Story</div>
  <div class="teaser-line">Coming Soon… June 22 💍</div>
</div>

<!-- MAIN APP -->
<header>💍 Sammed ❤️ Sahana</header>

<div class="hero">
  <div class="hero-text">Our Cinematic Love Story ✨</div>
</div>

<div class="invite">
  <h1>Wedding Invitation 💖</h1>
  <p>June 22 | Terdal</p>
</div>

<div class="nav" id="nav"></div>
<div id="content"></div>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCPVPeU7f8kBBJlcq-WURC2YT5rRQoYFVo",
  authDomain:"ss-wedding-e527d.firebaseapp.com",
  projectId:"ss-wedding-e527d"
});

const db=getFirestore(app);

let data={home:[],haldi:[],mehendi:[],wedding:[],reception:[]};
let current="home";

const titles={
  home:"Home 💖",
  haldi:"Haldi 🌼",
  mehendi:"Mehendi 💚",
  wedding:"Wedding 💍",
  reception:"Reception 🎉"
};

async function load(){
  const snap=await getDoc(doc(db,"wedding","album"));
  if(snap.exists() && snap.data()?.data){
    data=JSON.parse(snap.data().data);
  }

  render();

  // 🎬 TEASER EXIT
  setTimeout(()=>{
    document.getElementById("teaser").style.display="none";
    document.getElementById("music").play();
  },3500);
}

function nav(){
  const n=document.getElementById("nav");
  n.innerHTML="";

  Object.keys(data).forEach(k=>{
    const b=document.createElement("button");
    b.textContent=titles[k];
    if(k===current) b.classList.add("active");

    b.onclick=()=>{
      current=k;
      render();
    };

    n.appendChild(b);
  });
}

function content(){
  const c=document.getElementById("content");
  c.innerHTML="";

  Object.keys(data).forEach(k=>{
    const d=document.createElement("div");
    d.className=`page ${k===current?'active':''}`;

    d.innerHTML=`
      <div class="title">${titles[k]}</div>

      <div class="grid">
        ${(data[k]||[]).map(i=>`
          <div class="card" onclick="openImg('${i}')">
            <img src="${i}">
          </div>
        `).join("")}
      </div>
    `;

    c.appendChild(d);
  });
}

function render(){
  nav();
  content();
}

window.openImg=(src)=>{
  const d=document.createElement("div");
  d.className="popup";
  d.innerHTML=`<img src="${src}">`;
  d.onclick=()=>d.remove();
  document.body.appendChild(d);
};

load();
</script>

</body>
</html>
