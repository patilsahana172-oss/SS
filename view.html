<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sammed ❤️ Sahana</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap');

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter;
  color:#fff;
  overflow-x:hidden;

  background:
    radial-gradient(circle at 10% 20%, rgba(255,77,109,0.18), transparent 35%),
    radial-gradient(circle at 90% 30%, rgba(124,58,237,0.18), transparent 40%),
    radial-gradient(circle at 50% 90%, rgba(255,255,255,0.05), transparent 45%),
    linear-gradient(180deg,#07070a,#0b0c10,#07070a);
}

/* FLOAT GLOW */
body::before,
body::after{
  content:"";
  position:fixed;
  width:280px;
  height:280px;
  border-radius:50%;
  filter:blur(120px);
  opacity:.35;
  z-index:-1;
}

body::before{background:#ff4d6d;top:15%;left:-100px}
body::after{background:#7c3aed;bottom:10%;right:-100px}

/* HEADER */
header{
  padding:14px;
  text-align:center;
  font-family:'Playfair Display';
  font-weight:600;

  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(18px);

  border-bottom:1px solid rgba(255,255,255,0.06);

  position:sticky;
  top:0;
  z-index:10;
}

/* HERO */
.hero{
  margin:14px;
  height:190px;
  border-radius:20px;
  overflow:hidden;
  position:relative;

  background:url('https://images.unsplash.com/photo-1523438097201-512ae7d59c0b?q=80')
  center/cover;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.85),transparent);
}

.hero-text{
  position:absolute;
  bottom:14px;
  left:14px;
  font-family:'Playfair Display';
}

/* INVITE */
.invite{
  margin:14px;
  padding:18px;
  border-radius:20px;

  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(18px);

  border:1px solid rgba(255,255,255,0.08);

  text-align:center;
}

.invite h2{
  margin:0;
  color:#ff4d6d;
  font-family:'Playfair Display';
}

/* NAV */
.nav{
  display:flex;
  gap:10px;
  padding:10px;
  overflow-x:auto;

  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(16px);

  position:sticky;
  top:0;
  z-index:9;
}

.nav button{
  border:none;
  padding:10px 14px;
  border-radius:999px;

  background:transparent;
  color:rgba(255,255,255,0.7);

  font-size:13px;
  white-space:nowrap;
  transition:.3s;
}

.nav button.active{
  color:#fff;
  font-weight:600;
  position:relative;
}

.nav button.active::after{
  content:"";
  position:absolute;
  bottom:-6px;
  left:25%;
  width:50%;
  height:2px;
  background:#ff4d6d;
  border-radius:10px;
}

/* PAGE */
.page{
  display:none;
  padding:12px;
}

.page.active{
  display:block;
  animation:fade .35s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* TITLE */
.title{
  font-size:13px;
  margin:10px 4px;
  color:rgba(255,255,255,0.6);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

/* CARD */
.card{
  border-radius:16px;
  overflow:hidden;

  background:rgba(255,255,255,0.04);
  backdrop-filter:blur(14px);

  border:1px solid rgba(255,255,255,0.08);

  transform:translateY(15px);
  opacity:0;
  animation:cardIn .4s forwards;
}

.card:nth-child(1){animation-delay:.05s}
.card:nth-child(2){animation-delay:.1s}
.card:nth-child(3){animation-delay:.15s}
.card:nth-child(4){animation-delay:.2s}

@keyframes cardIn{
  to{transform:translateY(0);opacity:1}
}

.card img{
  width:100%;
  height:165px;
  object-fit:cover;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.92);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.popup img{
  max-width:92%;
  border-radius:18px;
  animation:zoom .2s ease;
}

@keyframes zoom{
  from{transform:scale(0.9)}
  to{transform:scale(1)}
}

/* MOBILE */
@media(max-width:480px){
  .grid{grid-template-columns:1fr 1fr}
  .card img{height:150px}
}
</style>
</head>

<body>

<header>💍 Sammed ❤️ Sahana</header>

<div class="hero">
  <div class="hero-text">Our Wedding Story ✨</div>
</div>

<div class="invite">
  <h2>Wedding Invitation 💖</h2>
  <p>June 22 • Terdal</p>
</div>

<div class="nav" id="nav"></div>
<div id="content"></div>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCPVPeU7f8kBBJlcq-WURC2YT5rRQoYFVo",
  authDomain:"ss-wedding-e527d.firebaseapp.com",
  projectId:"ss-wedding-e527d"
});

const db=getFirestore(app);

let data={home:[],haldi:[],mehendi:[],wedding:[],reception:[]};
let current="home";

const titles={
  home:"Home",
  haldi:"Haldi 🌼",
  mehendi:"Mehendi 💚",
  wedding:"Wedding 💍",
  reception:"Reception 🎉"
};

const safe=(k)=>titles[k]||k;

/* LOAD */
async function load(){
  const snap=await getDoc(doc(db,"wedding","album"));

  if(snap.exists() && snap.data()?.data){
    data=JSON.parse(snap.data().data);
  }

  render();

  setTimeout(()=>{
    document.getElementById("music").play();
  },1500);
}

/* NAV */
function nav(){
  const n=document.getElementById("nav");
  n.innerHTML="";

  Object.keys(data).forEach(k=>{
    const b=document.createElement("button");
    b.textContent=safe(k);

    if(k===current) b.classList.add("active");

    b.onclick=()=>{
      current=k;
      render();
    };

    n.appendChild(b);
  });
}

/* CONTENT */
function content(){
  const c=document.getElementById("content");
  c.innerHTML="";

  Object.keys(data).forEach(k=>{
    const d=document.createElement("div");
    d.className=`page ${k===current?'active':''}`;

    d.innerHTML=`
      <div class="title">${safe(k)}</div>

      <div class="grid">
        ${(data[k]||[]).map(i=>`
          <div class="card" onclick="openImg('${i}')">
            <img src="${i}">
          </div>
        `).join("")}
      </div>
    `;

    c.appendChild(d);
  });
}

function render(){
  nav();
  content();
}

/* POPUP */
window.openImg=(src)=>{
  const d=document.createElement("div");
  d.className="popup";
  d.innerHTML=`<img src="${src}">`;
  d.onclick=()=>d.remove();
  document.body.appendChild(d);
};

load();
</script>

</body>
</html>
