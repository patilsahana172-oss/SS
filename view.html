<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sammed ❤️ Sahana</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@500;700&display=swap');

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter;
  background:#07070a;
  color:#fff;
}

/* ================= INTRO ================= */
#intro{
  position:fixed;
  inset:0;
  z-index:9999;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
}

#intro::before{
  content:"";
  position:absolute;
  inset:0;
  background:url('https://images.unsplash.com/photo-1523438097201-512ae7d59c0b?q=80') center/cover;
  filter:brightness(0.35);
  transform:scale(1.1);
}

.intro-text{
  position:relative;
  text-align:center;
}

.intro-text h1{
  font-family:'Playfair Display';
  font-size:22px;
}

.intro-text p{
  color:#fda4af;
  margin-top:6px;
}

/* ================= HEADER ================= */
header{
  padding:14px;
  text-align:center;
  font-family:'Playfair Display';
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(12px);
  position:sticky;
  top:0;
  z-index:10;
}

/* ================= HERO ================= */
.hero{
  margin:12px;
  height:200px;
  border-radius:18px;
  overflow:hidden;
  position:relative;
  background:url('https://images.unsplash.com/photo-1523438097201-512ae7d59c0b?q=80') center/cover;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,#07070a,transparent);
}

.hero-text{
  position:absolute;
  bottom:12px;
  left:12px;
  font-family:'Playfair Display';
}

/* ================= BRAND TEASER ================= */
.brand-teaser{
  margin:14px;
  padding:18px;
  border-radius:16px;
  text-align:center;
  position:relative;
  overflow:hidden;
  background:linear-gradient(135deg,rgba(255,255,255,0.05),rgba(255,255,255,0.02));
  border:1px solid rgba(255,255,255,0.08);
}

.brand-glow{
  position:absolute;
  inset:-40px;
  background:radial-gradient(circle,#ff4d6d33,#0000 60%);
  filter:blur(30px);
}

.brand-title{
  font-family:'Playfair Display';
  font-size:18px;
  letter-spacing:3px;
  font-weight:700;
  position:relative;
  background:linear-gradient(90deg,#fff,#fda4af,#fff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.brand-sub{
  margin-top:6px;
  font-size:11px;
  color:#aaa;
  position:relative;
}

/* ================= INVITE ================= */
.invite-ai{
  margin:14px;
  padding:22px;
  border-radius:18px;
  background:linear-gradient(135deg,#0b0b10,#141421);
  border:1px solid rgba(255,255,255,0.08);
  text-align:center;
  position:relative;
  overflow:hidden;
}

.ai-header{
  font-size:10px;
  letter-spacing:2px;
  color:#aaa;
}

.names{
  font-family:'Playfair Display';
  font-size:24px;
  margin:10px 0;
}

.typing{
  font-size:13px;
  color:#fda4af;
  min-height:40px;
}

.info{
  display:flex;
  justify-content:space-around;
  margin-top:14px;
  font-size:13px;
  color:#ddd;
}

/* ================= NAV ================= */
.nav{
  display:flex;
  gap:10px;
  padding:10px;
  overflow-x:auto;
}

.nav button{
  border:none;
  padding:10px 14px;
  border-radius:999px;
  background:rgba(255,255,255,0.05);
  color:#aaa;
}

.nav button.active{
  color:#fff;
  border:1px solid rgba(255,255,255,0.2);
}

/* ================= PAGE ================= */
.page{display:none;padding:12px}
.page.active{display:block}

/* ================= GRID ================= */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.card{
  border-radius:14px;
  overflow:hidden;
  background:rgba(255,255,255,0.04);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
}

/* ================= POPUP ================= */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.popup img{
  max-width:92%;
  border-radius:14px;
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="intro-text">
    <h1>💍 Cinematic Love Story</h1>
    <p>Sammed ❤️ Sahana</p>
  </div>
</div>

<header>💍 Sammed ❤️ Sahana</header>

<div class="hero">
  <div class="hero-text">Wedding Journey ✨</div>
</div>

<!-- BRAND TEASER -->
<div class="brand-teaser">
  <div class="brand-glow"></div>
  <div class="brand-title">PATIL × KULLI</div>
  <div class="brand-sub">A cinematic wedding production</div>
</div>

<!-- INVITE -->
<div class="invite-ai">
  <div class="ai-header">AI WEDDING STORY</div>
  <div class="names">Sammed ❤️ Sahana</div>
  <div class="typing" id="typing"></div>
  <div class="info">
    <div>📅 June 22</div>
    <div>📍 Terdal</div>
  </div>
</div>

<!-- NAV -->
<div class="nav" id="nav"></div>

<!-- CONTENT -->
<div id="content"></div>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCPVPeU7f8kBBJlcq-WURC2YT5rRQoYFVo",
  authDomain:"ss-wedding-e527d.firebaseapp.com",
  projectId:"ss-wedding-e527d"
});

const db = getFirestore(app);

let data={home:[],haldi:[],mehendi:[],wedding:[],reception:[]};
let current="home";

const titles={
  home:"Home",
  haldi:"Haldi 🌼",
  mehendi:"Mehendi 💚",
  wedding:"Wedding 💍",
  reception:"Reception 🎉"
};

/* LOAD */
async function load(){
  const snap=await getDoc(doc(db,"wedding","album"));
  if(snap.exists() && snap.data()?.data){
    data=JSON.parse(snap.data().data);
  }

  render();

  setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("music").play();
  },3000);
}

/* NAV */
function nav(){
  const n=document.getElementById("nav");
  n.innerHTML="";
  Object.keys(data).forEach(k=>{
    const b=document.createElement("button");
    b.textContent=titles[k]||k;
    if(k===current) b.classList.add("active");
    b.onclick=()=>{current=k;render();}
    n.appendChild(b);
  });
}

/* CONTENT */
function content(){
  const c=document.getElementById("content");
  c.innerHTML="";
  Object.keys(data).forEach(k=>{
    const d=document.createElement("div");
    d.className=`page ${k===current?'active':''}`;
    d.innerHTML=`
      <div class="grid">
        ${(data[k]||[]).map(i=>`
          <div class="card" onclick="openImg('${i}')">
            <img src="${i}">
          </div>
        `).join("")}
      </div>
    `;
    c.appendChild(d);
  });
}

function render(){
  nav();
  content();
}

/* POPUP */
window.openImg=(src)=>{
  const d=document.createElement("div");
  d.className="popup";
  d.innerHTML=`<img src="${src}">`;
  d.onclick=()=>d.remove();
  document.body.appendChild(d);
};

/* TYPE EFFECT */
const text=[
"Generating wedding story...",
"Two souls connected by destiny ❤️",
"A journey begins forever..."
];

let i=0,j=0;

function type(){
  const el=document.getElementById("typing");
  if(!el) return;

  el.innerHTML=text[i].substring(0,j);
  j++;

  if(j<=text[i].length){
    setTimeout(type,40);
  }else{
    i=(i+1)%text.length;
    j=0;
    setTimeout(type,800);
  }
}

setTimeout(type,1000);

load();
</script>

</body>
</html>
