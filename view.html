<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sammed ❤️ Sahana | Wedding Trailer</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;500;600&display=swap');

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter;
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* 🎬 TRAILER INTRO FULL SCREEN */
#intro{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
}

.trailer-title{
  font-family:'Playfair Display';
  font-size:2.2rem;
  animation:zoomIn 2s ease;
  text-align:center;
}

.trailer-sub{
  margin-top:10px;
  color:#fda4af;
  opacity:0;
  animation:fadeIn 2s ease 1.2s forwards;
}

@keyframes zoomIn{
  from{transform:scale(1.4);opacity:0}
  to{transform:scale(1);opacity:1}
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

/* 🎬 HERO TRAILER BANNER */
.hero{
  height:220px;
  margin:12px;
  border-radius:18px;
  position:relative;
  overflow:hidden;
  background-size:cover;
  background-position:center;
  box-shadow:0 25px 70px rgba(0,0,0,0.7);
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);
}

.hero-text{
  position:absolute;
  bottom:14px;
  left:14px;
  font-family:'Playfair Display';
  font-size:18px;
}

/* 💍 INVITATION SCENE (TRAILER STYLE) */
.invite{
  margin:12px;
  padding:18px;
  border-radius:16px;
  background:linear-gradient(135deg,#fff,#ffe4e6);
  color:#111;
  text-align:center;
  animation:fadeUp 1s ease;
}

@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

.invite h1{
  font-family:'Playfair Display';
  color:#e11d48;
}

/* NAV (TRAILER CHAPTERS) */
.nav{
  display:flex;
  gap:10px;
  padding:10px;
  overflow-x:auto;
  background:rgba(0,0,0,0.9);
  position:sticky;
  top:0;
  z-index:10;
}

.nav button{
  border:none;
  padding:10px 16px;
  border-radius:999px;
  background:#1f1f2b;
  color:white;
  font-weight:600;
}

.nav button.active{
  background:#e11d48;
}

/* PAGE */
.page{display:none}
.page.active{display:block}

/* 🎥 TRAILER GRID (MOVIE SCENES) */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:12px;
}

@media(min-width:600px){
  .grid{grid-template-columns:repeat(3,1fr);}
}

/* 🎬 CINEMATIC SCENE CARD */
.card{
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
  box-shadow:0 15px 35px rgba(0,0,0,0.6);
  position:relative;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
  filter:contrast(1.1) brightness(0.85);
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.popup img{
  max-width:92%;
  border-radius:12px;
}

/* FADE BETWEEN SCENES */
.scene-title{
  padding:12px;
  font-family:'Playfair Display';
  font-size:18px;
  color:#fda4af;
}
</style>
</head>

<body>

<!-- 🎬 TRAILER INTRO -->
<div id="intro">
  <div class="trailer-title">A Love Story</div>
  <div class="trailer-sub">Sammed ❤️ Sahana</div>
</div>

<!-- NAV -->
<div class="nav" id="nav"></div>

<!-- CONTENT -->
<div id="content"></div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCPVPeU7f8kBBJlcq-WURC2YT5rRQoYFVo",
  authDomain:"ss-wedding-e527d.firebaseapp.com",
  projectId:"ss-wedding-e527d"
});

const db=getFirestore(app);

let data={
  home:[],
  haldi:[],
  mehendi:[],
  wedding:[],
  reception:[]
};

let current="home";

const titles={
  home:"Trailer",
  haldi:"Haldi Scene 🌼",
  mehendi:"Mehendi Scene 💚",
  wedding:"Wedding Scene 💍",
  reception:"Final Scene 🎉"
};

const heroImages={
  haldi:"https://images.unsplash.com/photo-1606800052052-a08af7148866?q=80",
  mehendi:"https://images.unsplash.com/photo-1600047509807-ba8f99d2cdde?q=80",
  wedding:"https://images.unsplash.com/photo-1523438097201-512ae7d59c0b?q=80",
  reception:"https://images.unsplash.com/photo-1531058020387-3be344556be6?q=80"
};

/* LOAD */
async function load(){
  const snap=await getDoc(doc(db,"wedding","album"));
  if(snap.exists() && snap.data()?.data){
    data=JSON.parse(snap.data().data);
  }

  render();

  setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("music").play();
  },2500);
}

/* NAV */
function nav(){
  const n=document.getElementById("nav");
  n.innerHTML="";

  Object.keys(data).forEach(k=>{
    const b=document.createElement("button");
    b.textContent=titles[k];
    if(k===current) b.classList.add("active");

    b.onclick=()=>{
      current=k;
      render();
    };

    n.appendChild(b);
  });
}

/* CONTENT */
function content(){
  const c=document.getElementById("content");
  c.innerHTML="";

  Object.keys(data).forEach(k=>{
    const d=document.createElement("div");
    d.className=`page ${k===current?'active':''}`;

    if(k==="home"){
      d.innerHTML=`
        <div class="hero" style="background-image:url('https://images.unsplash.com/photo-1523438097201-512ae7d59c0b?q=80')">
          <div class="hero-text">🎬 Official Wedding Trailer</div>
        </div>

        <div class="invite">
          <h1>Sammed ❤️ Sahana</h1>
          <p>📅 June 22 | 📍 Terdal</p>
          <p>“A love story unfolding like a movie”</p>
        </div>
      `;
    } else {
      d.innerHTML=`
        <div class="hero" style="background-image:url('${heroImages[k]}')">
          <div class="hero-text">${titles[k]}</div>
        </div>

        <div class="scene-title">${titles[k]}</div>

        <div class="grid">
          ${(data[k]||[]).map(i=>`
            <div class="card" onclick="openImg('${i}')">
              <img src="${i}">
            </div>
          `).join("")}
        </div>
      `;
    }

    c.appendChild(d);
  });
}

/* RENDER */
function render(){
  nav();
  content();
}

/* POPUP */
window.openImg=(src)=>{
  const d=document.createElement("div");
  d.className="popup";
  d.innerHTML=`<img src="${src}">`;
  d.onclick=()=>d.remove();
  document.body.appendChild(d);
};

load();
</script>

</body>
</html>
