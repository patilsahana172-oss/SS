<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sammed ❤️ Sahana</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;500;600&display=swap');

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter;
  background:radial-gradient(circle at top,#1a1a2e,#0b0b0f);
  color:white;
}

/* HEADER */
header{
  padding:16px;
  text-align:center;
  font-family:'Playfair Display';
  font-size:20px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
  z-index:10;
}

/* HERO CARD (HOME) */
.hero{
  margin:16px;
  padding:24px;
  border-radius:22px;
  background:linear-gradient(135deg,#ffffff,#ffe4e6);
  color:#111;
  text-align:center;
  box-shadow:0 20px 50px rgba(255,0,80,0.2);
}

.hero h1{
  font-family:'Playfair Display';
  color:#e11d48;
  margin:0;
}

/* SECTION GRID (UNIFIED STYLE) */
.section-title{
  padding:10px 16px;
  font-size:18px;
  font-weight:700;
  color:#fda4af;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:12px;
}

@media(min-width:600px){
  .grid{grid-template-columns:repeat(3,1fr);}
}

/* CARD STYLE (USED EVERYWHERE SAME LOOK) */
.card{
  border-radius:16px;
  overflow:hidden;
  position:relative;
  cursor:pointer;
  box-shadow:0 10px 25px rgba(0,0,0,0.4);
  transition:.3s;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
  display:block;
}

/* NAV */
.nav{
  display:flex;
  gap:10px;
  padding:10px;
  overflow-x:auto;
  background:rgba(0,0,0,0.7);
  position:sticky;
  top:60px;
  z-index:9;
}

.nav button{
  border:none;
  padding:10px 14px;
  border-radius:999px;
  background:#1f1f2b;
  color:white;
  white-space:nowrap;
  font-weight:600;
}

.nav button.active{
  background:#e11d48;
}

/* PAGE SYSTEM */
.page{
  display:none;
  animation:fade .5s ease;
}

.page.active{
  display:block;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* INVITATION CARD */
.invite{
  margin:16px;
  padding:18px;
  border-radius:18px;
  background:linear-gradient(135deg,#fff,#ffe4e6);
  color:#111;
  text-align:center;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.popup img{
  max-width:92%;
  border-radius:12px;
}

/* BACK BUTTON */
.back{
  margin:10px 12px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:#e11d48;
  color:white;
  font-weight:600;
}
</style>
</head>

<body>

<header>💍 Sammed ❤️ Sahana</header>

<!-- NAV -->
<div class="nav" id="nav"></div>

<!-- CONTENT -->
<div id="content"></div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCPVPeU7f8kBBJlcq-WURC2YT5rRQoYFVo",
  authDomain:"ss-wedding-e527d.firebaseapp.com",
  projectId:"ss-wedding-e527d"
});

const db=getFirestore(app);

let data={
  home:[],
  haldi:[],
  mehendi:[],
  wedding:[],
  reception:[]
};

let current="home";

const titles={
  home:"Home 💌",
  haldi:"Haldi 🌼",
  mehendi:"Mehendi 💚",
  wedding:"Wedding 💍",
  reception:"Reception 🎉"
};

/* LOAD */
async function load(){
  const snap=await getDoc(doc(db,"wedding","album"));

  if(snap.exists() && snap.data()?.data){
    data=JSON.parse(snap.data().data);
  }

  render();

  setTimeout(()=>{
    document.getElementById("music").play();
  },1500);
}

/* NAV */
function nav(){
  const n=document.getElementById("nav");
  n.innerHTML="";

  Object.keys(data).forEach(k=>{
    const b=document.createElement("button");
    b.textContent=titles[k];
    if(k===current) b.classList.add("active");

    b.onclick=()=>{
      current=k;
      render();
    };

    n.appendChild(b);
  });
}

/* CONTENT */
function content(){
  const c=document.getElementById("content");
  c.innerHTML="";

  /* HOME */
  const home=document.createElement("div");
  home.className=`page ${current==='home'?'active':''}`;

  home.innerHTML=`
    <div class="hero">
      <h1>Sammed ❤️ Sahana</h1>
      <p>Our Love Story 💍</p>
    </div>

    <div class="invite">
      <h3>Wedding Invitation</h3>
      <p>📅 June 22</p>
      <p>📍 Terdal</p>
    </div>
  `;

  c.appendChild(home);

  /* SECTIONS */
  Object.keys(data).forEach(k=>{
    if(k==="home") return;

    const d=document.createElement("div");
    d.className=`page ${current===k?'active':''}`;

    d.innerHTML=`
      <div class="section-title">${titles[k]}</div>

      <div class="grid">
        ${(data[k]||[]).map(i=>`
          <div class="card" onclick="openImg('${i}')">
            <img src="${i}">
          </div>
        `).join("")}
      </div>
    `;

    c.appendChild(d);
  });
}

/* RENDER */
function render(){
  nav();
  content();
}

/* IMAGE POPUP */
window.openImg=(src)=>{
  const d=document.createElement("div");
  d.className="popup";
  d.innerHTML=`<img src="${src}">`;
  d.onclick=()=>d.remove();
  document.body.appendChild(d);
};

load();
</script>

</body>
</html>
