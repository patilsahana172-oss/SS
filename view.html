<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SS Wedding 💖</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#fff1f2,#ffe4e6);
  color:#1e293b;
}

/* HEADER */
header{
  text-align:center;
  padding:14px;
  font-weight:800;
  background:rgba(255,255,255,0.7);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
}

/* NAV */
.nav{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}

.nav button{
  border:none;
  padding:10px 16px;
  border-radius:999px;
  background:white;
  font-weight:600;
  white-space:nowrap;
}

.nav button.active{
  background:#e11d48;
  color:white;
}

/* PAGE */
.page{
  display:none;
  padding:12px;
}

.page.active{
  display:block;
}

/* HERO */
.hero{
  height:75vh;
  border-radius:20px;
  overflow:hidden;
  position:relative;
  background:url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80') center/cover;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.5);
}

.hero-content{
  position:absolute;
  bottom:20px;
  left:20px;
  color:white;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:10px;
}

.card{
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  background:white;
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.popup img{
  max-width:90%;
  border-radius:10px;
}
</style>
</head>

<body>

<header>Sammed ❤️ Sahana</header>

<div class="nav" id="nav"></div>
<div id="pages"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const app = initializeApp({
  apiKey: "AIzaSyCPVPeU7f8kBBJlcq-WURC2YT5rRQoYFVo",
  authDomain: "ss-wedding-e527d.firebaseapp.com",
  projectId: "ss-wedding-e527d"
});

const db = getFirestore(app);

let data = {
  home: [],
  haldi: [],
  mehendi: [],
  wedding: [],
  reception: []
};

let current = "home";

const titles = {
  home:"Invitation",
  haldi:"Haldi 🌼",
  mehendi:"Mehendi 💚",
  wedding:"Wedding 💍",
  reception:"Reception 🎉"
};

/* ✅ SAFE LOAD */
async function load(){
  try{
    const snap = await getDoc(doc(db,'wedding','album'));

    if(snap.exists() && snap.data()?.data){
      data = JSON.parse(snap.data().data);
    }

    // safety fix
    Object.keys(data).forEach(k=>{
      if(!Array.isArray(data[k])) data[k] = [];
    });

    renderNav();
    renderPages();

  }catch(err){
    console.log("Load error:", err);
    renderNav();
    renderPages();
  }
}

/* NAV */
function renderNav(){
  const nav = document.getElementById("nav");
  nav.innerHTML="";

  Object.keys(data).forEach(k=>{
    const b=document.createElement("button");
    b.textContent=titles[k]||k;
    if(k===current) b.classList.add("active");

    b.onclick=()=>{
      current=k;
      renderNav();
      renderPages();
    };

    nav.appendChild(b);
  });
}

/* PAGES */
function renderPages(){
  const pages=document.getElementById("pages");
  pages.innerHTML="";

  Object.keys(data).forEach(k=>{
    const div=document.createElement("div");
    div.className=`page ${k===current?'active':''}`;

    if(k==="home"){
      div.innerHTML=`
        <div class="hero">
          <div class="hero-content">
            <h1>Sammed ❤️ Sahana</h1>
            <p>Wedding Invitation 💖</p>
          </div>
        </div>
      `;
    }else{
      div.innerHTML=`
        <div class="grid">
          ${(data[k]||[]).map(img=>`
            <div class="card" onclick="showImage('${img}')">
              <img src="${img}">
            </div>
          `).join("")}
        </div>
      `;
    }

    pages.appendChild(div);
  });
}

/* IMAGE POPUP */
window.showImage=function(src){
  const d=document.createElement("div");
  d.className="popup";
  d.innerHTML=`<img src="${src}">`;
  d.onclick=()=>d.remove();
  document.body.appendChild(d);
};

/* START */
load();
</script>

</body>
</html>
