<!DOCTYPE html>
<html>
<head>
<title>Wedding Gallery 💖</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#fff0f5,#ffe4ec);
}

/* HEADER */
header{
  padding:15px;
  text-align:center;
  font-size:20px;
  font-weight:700;
  color:#c4004c;
  background:white;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

/* SUB TEXT */
.sub{
  text-align:center;
  font-size:14px;
  color:#555;
  margin-top:5px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.card img{
  width:100%;
  height:180px;
  object-fit:cover;
  transition:0.3s;
}

.card img:hover{
  transform:scale(1.05);
}

/* SECTION TITLE */
.sec-title{
  grid-column:span 2;
  margin-top:10px;
  font-weight:bold;
  color:#ff4d6d;
  font-size:16px;
}
</style>

</head>

<body>

<header>💖 Wedding Memories Gallery</header>
<div class="sub">Sammed ❤️ Sahana</div>

<div class="grid" id="grid"></div>

<script>
let data = JSON.parse(localStorage.getItem("weddingApp")) || {
  haldi:[],
  mehendi:[],
  wedding:[]
};

let g=document.getElementById("grid");

/* SHOW ALL SECTIONS */
Object.keys(data).forEach(section=>{

  if(data[section].length > 0){
    g.innerHTML += `<div class="sec-title">📸 ${section.toUpperCase()}</div>`;
  }

  data[section].forEach(url=>{
    g.innerHTML += `
      <div class="card">
        <img src="${url}">
      </div>
    `;
  });

});
</script>

</body>
</html>
