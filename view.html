<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sammed ❤️ Sahana</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;500;600&display=swap');

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter;
  background:#0b0b0f;
  color:white;
}

/* 🎬 INTRO */
#intro{
  position:fixed;
  inset:0;
  background:radial-gradient(circle,#1a1a1f,#000);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
  transition:1s ease;
}

.logo{
  font-family:'Playfair Display';
  font-size:2.8rem;
  letter-spacing:2px;
  animation:fadeIn 2s ease;
}

.sub{
  opacity:0;
  margin-top:10px;
  animation:fadeIn 2s ease 1.2s forwards;
  color:#fda4af;
}

@keyframes fadeIn{
  from{opacity:0;transform:scale(.9)}
  to{opacity:1;transform:scale(1)}
}

/* 💌 INVITE CARD */
.invite{
  margin:20px;
  padding:20px;
  border-radius:18px;
  background:linear-gradient(135deg,#fff,#ffe4e6);
  color:#111;
  text-align:center;
  animation:rise 1.2s ease;
  box-shadow:0 20px 50px rgba(255,0,80,0.2);
}

@keyframes rise{
  from{transform:translateY(20px);opacity:0}
  to{transform:translateY(0);opacity:1}
}

.invite h1{
  font-family:'Playfair Display';
  color:#e11d48;
}

/* NAV */
.nav{
  display:flex;
  gap:10px;
  padding:10px;
  overflow-x:auto;
  background:rgba(0,0,0,0.7);
  position:sticky;
  top:0;
  z-index:10;
}

.nav button{
  border:none;
  padding:10px 16px;
  border-radius:999px;
  background:#1f1f2b;
  color:white;
  font-weight:600;
}

.nav button.active{
  background:#e11d48;
}

/* PAGE */
.page{
  display:none;
  padding:15px;
  animation:fade .6s ease;
}

.page.active{
  display:block;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;
}

.card{
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:200px;
  object-fit:cover;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.popup img{
  max-width:90%;
  border-radius:12px;
}
</style>
</head>

<body>

<!-- 🎬 INTRO -->
<div id="intro">
  <div class="logo">A Love Story</div>
  <div class="sub">Sammed ❤️ Sahana</div>
</div>

<!-- 💌 INVITATION -->
<div class="invite">
  <h1>Wedding Invitation 💍</h1>
  <p>Sammed & Sahana</p>
  <p>📅 June 22</p>
  <p>📍 Terdal</p>
</div>

<!-- NAV -->
<div class="nav" id="nav"></div>

<!-- CONTENT -->
<div id="content"></div>

<!-- 🎶 MUSIC -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCPVPeU7f8kBBJlcq-WURC2YT5rRQoYFVo",
  authDomain:"ss-wedding-e527d.firebaseapp.com",
  projectId:"ss-wedding-e527d"
});

const db=getFirestore(app);

let data={
  home:[],
  haldi:[],
  mehendi:[],
  wedding:[],
  reception:[]
};

let current="home";

const titles={
  home:"Home",
  haldi:"Haldi 🌼",
  mehendi:"Mehendi 💚",
  wedding:"Wedding 💍",
  reception:"Reception 🎉"
};

/* LOAD */
async function load(){
  try{
    const snap=await getDoc(doc(db,"wedding","album"));
    if(snap.exists() && snap.data()?.data){
      data=JSON.parse(snap.data().data);
    }
  }catch(e){
    console.log(e);
  }

  render();

  setTimeout(()=>{
    document.getElementById("intro").style.display="none";
    document.getElementById("music").play();
  },2500);
}

/* NAV */
function nav(){
  const n=document.getElementById("nav");
  n.innerHTML="";

  Object.keys(data).forEach(k=>{
    const b=document.createElement("button");
    b.textContent=titles[k];
    if(k===current) b.classList.add("active");

    b.onclick=()=>{
      current=k;
      render();
    };

    n.appendChild(b);
  });
}

/* CONTENT */
function content(){
  const c=document.getElementById("content");
  c.innerHTML="";

  Object.keys(data).forEach(k=>{
    const d=document.createElement("div");
    d.className=`page ${k===current?'active':''}`;

    if(k==="home"){
      d.innerHTML="";
    }else{
      d.innerHTML=`
        <div class="grid">
          ${(data[k]||[]).map(i=>`
            <div class="card" onclick="openImg('${i}')">
              <img src="${i}">
            </div>
          `).join("")}
        </div>
      `;
    }

    c.appendChild(d);
  });
}

/* RENDER */
function render(){
  nav();
  content();
}

/* IMAGE */
window.openImg=(src)=>{
  const d=document.createElement("div");
  d.className="popup";
  d.innerHTML=`<img src="${src}">`;
  d.onclick=()=>d.remove();
  document.body.appendChild(d);
};

load();
</script>

</body>
</html>
