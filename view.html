<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sammed ❤️ Sahana</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;500;600&display=swap');

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter;
  background:#0b0b0f;
  color:white;
}

/* HEADER */
header{
  padding:14px;
  text-align:center;
  font-family:'Playfair Display';
  font-size:18px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
  z-index:10;
}

/* NAV */
.nav{
  display:flex;
  gap:10px;
  padding:10px;
  overflow-x:auto;
  background:rgba(0,0,0,0.75);
  position:sticky;
  top:55px;
  z-index:9;
}

.nav button{
  border:none;
  padding:10px 14px;
  border-radius:999px;
  background:#1f1f2b;
  color:white;
  font-weight:600;
  white-space:nowrap;
}

.nav button.active{
  background:#e11d48;
}

/* PAGES */
.page{display:none}
.page.active{display:block}

/* 💍 GRAND INVITATION */
.invite-hero{
  margin:12px;
  height:340px;
  border-radius:22px;
  position:relative;
  overflow:hidden;
  background:url('https://images.unsplash.com/photo-1523438097201-512ae7d59c0b?q=80') center/cover;
  box-shadow:0 25px 70px rgba(0,0,0,0.7);
}

.invite-hero .overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.85),rgba(0,0,0,0.3));
}

.invite-content{
  position:absolute;
  bottom:18px;
  left:16px;
  right:16px;
  animation:fadeUp 1s ease;
}

.tag{
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  font-size:11px;
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(10px);
  margin-bottom:10px;
}

.invite-content h1{
  font-family:'Playfair Display';
  font-size:26px;
  margin:0;
}

.line{
  font-size:13px;
  opacity:0.9;
  margin:6px 0 10px;
}

.details{
  font-size:13px;
  opacity:0.9;
  display:flex;
  flex-direction:column;
  gap:4px;
}

.quote{
  margin-top:10px;
  font-size:12px;
  font-style:italic;
  opacity:0.8;
}

/* SECTION TITLE */
.title{
  padding:10px 14px;
  color:#fda4af;
  font-weight:700;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:12px;
}

@media(min-width:600px){
  .grid{grid-template-columns:repeat(3,1fr);}
}

/* IMAGE CARD */
.card{
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.popup img{
  max-width:92%;
  border-radius:12px;
}

/* ANIMATION */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(15px)}
  to{opacity:1;transform:translateY(0)}
}
</style>
</head>

<body>

<header>💍 Sammed ❤️ Sahana</header>

<div class="nav" id="nav"></div>

<div id="content"></div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCPVPeU7f8kBBJlcq-WURC2YT5rRQoYFVo",
  authDomain:"ss-wedding-e527d.firebaseapp.com",
  projectId:"ss-wedding-e527d"
});

const db=getFirestore(app);

let data={
  home:[],
  haldi:[],
  mehendi:[],
  wedding:[],
  reception:[]
};

let current="home";

const titles={
  home:"Home",
  haldi:"Haldi 🌼",
  mehendi:"Mehendi 💚",
  wedding:"Wedding 💍",
  reception:"Reception 🎉"
};

/* LOAD */
async function load(){
  const snap=await getDoc(doc(db,"wedding","album"));
  if(snap.exists() && snap.data()?.data){
    data=JSON.parse(snap.data().data);
  }
  render();
  setTimeout(()=>document.getElementById("music").play(),1500);
}

/* NAV */
function nav(){
  const n=document.getElementById("nav");
  n.innerHTML="";

  Object.keys(data).forEach(k=>{
    const b=document.createElement("button");
    b.textContent=titles[k];
    if(k===current) b.classList.add("active");

    b.onclick=()=>{
      current=k;
      render();
    };

    n.appendChild(b);
  });
}

/* CONTENT */
function content(){
  const c=document.getElementById("content");
  c.innerHTML="";

  Object.keys(data).forEach(k=>{
    const d=document.createElement("div");
    d.className=`page ${current===k?'active':''}`;

    if(k==="home"){
      d.innerHTML=`
        <div class="invite-hero">
          <div class="overlay"></div>

          <div class="invite-content">
            <div class="tag">💌 WEDDING INVITATION</div>
            <h1>Sammed ❤️ Sahana</h1>
            <p class="line">Two hearts • One story • Forever begins</p>

            <div class="details">
              <div>📅 June 22, 2026</div>
              <div>📍 Terdal</div>
            </div>

            <div class="quote">
              “A love written by destiny, celebrated with hearts together.”
            </div>
          </div>
        </div>
      `;
    } else {
      d.innerHTML=`
        <div class="title">${titles[k]} Moments</div>

        <div class="grid">
          ${(data[k]||[]).map(i=>`
            <div class="card" onclick="openImg('${i}')">
              <img src="${i}">
            </div>
          `).join("")}
        </div>
      `;
    }

    c.appendChild(d);
  });
}

/* RENDER */
function render(){
  nav();
  content();
}

/* IMAGE */
window.openImg=(src)=>{
  const d=document.createElement("div");
  d.className="popup";
  d.innerHTML=`<img src="${src}">`;
  d.onclick=()=>d.remove();
  document.body.appendChild(d);
};

load();
</script>

</body>
</html>
