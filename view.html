<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sammed ❤️ Sahana</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;500;600&display=swap');

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter;
  background:#0b0b0f;
  color:white;
}

/* HEADER */
header{
  padding:16px;
  text-align:center;
  font-family:'Playfair Display';
  font-weight:700;
  background:rgba(0,0,0,0.85);
  position:sticky;
  top:0;
  z-index:10;
}

/* 💖 GRAND HERO HEADER (NEW ADDITION) */
.hero-banner{
  margin:12px;
  height:160px;
  border-radius:18px;
  background:url('https://images.unsplash.com/photo-1523438097201-512ae7d59c0b?q=80') center/cover;
  position:relative;
  overflow:hidden;
}

.hero-banner::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);
}

.hero-banner h2{
  position:absolute;
  bottom:12px;
  left:12px;
  font-family:'Playfair Display';
  font-size:18px;
}

/* STORY GRID HOME */
.story-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:14px;
  padding:14px;
}

.story-card{
  height:150px;
  border-radius:18px;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.story-card:hover{
  transform:scale(1.02);
}

.story-card img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(0.65);
}

.story-title{
  position:absolute;
  bottom:12px;
  left:12px;
  font-size:18px;
  font-weight:700;
}

/* SECTION */
.section{
  display:none;
  padding:10px;
}

.section.active{
  display:block;
  animation:fade .4s ease;
}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* BACK BUTTON (IMPROVED) */
.back{
  position:sticky;
  top:60px;
  width:100%;
  padding:12px;
  background:rgba(0,0,0,0.85);
  border:none;
  color:white;
  font-weight:600;
  text-align:left;
  border-radius:10px;
  margin-bottom:10px;
}

/* IMAGE GRID (CINEMATIC CARDS) */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.card{
  border-radius:16px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  filter:contrast(1.1) brightness(0.9);
}

/* POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.popup img{
  max-width:92%;
  border-radius:12px;
}

/* MOBILE */
@media(min-width:600px){
  .grid{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>

<body>

<header>💍 Sammed ❤️ Sahana</header>

<!-- CINEMATIC BANNER -->
<div class="hero-banner">
  <h2>Our Love Story ✨</h2>
</div>

<!-- HOME -->
<div id="home" class="story-grid"></div>

<!-- SECTIONS -->
<div id="sections"></div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCPVPeU7f8kBBJlcq-WURC2YT5rRQoYFVo",
  authDomain:"ss-wedding-e527d.firebaseapp.com",
  projectId:"ss-wedding-e527d"
});

const db=getFirestore(app);

let data={
  home:[],
  haldi:[],
  mehendi:[],
  wedding:[],
  reception:[]
};

const titles={
  haldi:"Haldi 🌼",
  mehendi:"Mehendi 💚",
  wedding:"Wedding 💍",
  reception:"Reception 🎉"
};

/* LOAD */
async function load(){
  const snap=await getDoc(doc(db,"wedding","album"));

  if(snap.exists() && snap.data()?.data){
    data=JSON.parse(snap.data().data);
  }

  renderHome();

  setTimeout(()=>document.getElementById("music").play(),1200);
}

/* HOME STORY UI (YOUR ORIGINAL IDEA, ENHANCED) */
function renderHome(){
  const home=document.getElementById("home");
  home.innerHTML="";

  Object.keys(data).forEach(k=>{
    if(k==="home") return;

    const div=document.createElement("div");
    div.className="story-card";
    div.onclick=()=>openSection(k);

    div.innerHTML=`
      <img src="${data[k][0] || 'https://images.unsplash.com/photo-1523438097201-512ae7d59c0b?q=80'}">
      <div class="story-title">${titles[k]}</div>
    `;

    home.appendChild(div);
  });
}

/* OPEN SECTION */
function openSection(key){
  document.getElementById("home").style.display="none";

  const sec=document.getElementById("sections");
  sec.innerHTML="";

  const wrap=document.createElement("div");
  wrap.className="section active";

  wrap.innerHTML=`
    <button class="back" onclick="goBack()">← Back to Story</button>

    <div class="grid">
      ${(data[key]||[]).map(i=>`
        <div class="card" onclick="openImg('${i}')">
          <img src="${i}">
        </div>
      `).join("")}
    </div>
  `;

  sec.appendChild(wrap);
}

/* BACK */
window.goBack=function(){
  document.getElementById("sections").innerHTML="";
  document.getElementById("home").style.display="grid";
};

/* POPUP */
window.openImg=function(src){
  const d=document.createElement("div");
  d.className="popup";
  d.innerHTML=`<img src="${src}">`;
  d.onclick=()=>d.remove();
  document.body.appendChild(d);
};

load();
</script>

</body>
</html>
