<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SS Wedding 💖</title>

<style>
:root{--primary:#e11d48;--secondary:#fb7185;}
body{margin:0;font-family:system-ui;background:#fff1f2;color:#333}

/* 💌 ENVELOPE */
#envelope{position:fixed;inset:0;background:linear-gradient(135deg,#e11d48,#fb7185);display:flex;justify-content:center;align-items:center;z-index:9999}
.letter{background:white;padding:30px;border-radius:12px;cursor:pointer;font-weight:bold;transition:.6s}
.letter.open{transform:scale(8);opacity:0}

/* 🎬 HERO */
.hero{height:100vh;background:url('https://images.unsplash.com/photo-1519741497674-611481863552?q=80') center/cover;position:relative}
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.5)}
.hero-content{position:absolute;bottom:40px;left:20px;color:white}

/* NAV */
.nav{display:flex;overflow:auto;gap:10px;padding:10px}
.nav button{padding:8px 14px;border:none;border-radius:999px;background:white}
.nav button.active{background:linear-gradient(135deg,#e11d48,#fb7185);color:white}

/* GRID */
.grid{column-count:2;column-gap:10px;padding:10px}
.card{margin-bottom:10px;border-radius:12px;overflow:hidden;cursor:pointer}
.card img{width:100%}

/* SLIDESHOW */
#slideshow{height:60vh}
#slideshow img{width:100%;height:100%;object-fit:cover}

/* TIMELINE */
.timeline{padding:15px}
.timeline div{background:white;margin:10px 0;padding:10px;border-radius:10px}

/* MUSIC BTN */
.music-btn{position:fixed;bottom:20px;left:20px;width:50px;height:50px;border:none;border-radius:50%;background:#e11d48;color:white}

/* FLOAT */
@keyframes float{0%{transform:translateY(0)}100%{transform:translateY(-100vh)}}
</style>
</head>

<body>

<div id="envelope">
  <div class="letter" onclick="openInvite()">💌 Open Invitation</div>
</div>

<header style="text-align:center;padding:10px;font-weight:bold;">
Sammed ❤️ Sahana
</header>

<div class="nav" id="nav"></div>
<div id="pages"></div>

<audio id="bgMusic" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3" type="audio/mpeg">
</audio>
<button class="music-btn" onclick="toggleMusic()">🎶</button>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const app = initializeApp({
  apiKey:'AIzaSyCPVPeU7f8kBBJlcq-WURC2YT5rRQoYFVo',
  authDomain:'ss-wedding-e527d.firebaseapp.com',
  projectId:'ss-wedding-e527d'
});
const db = getFirestore(app);

let data = {};
let current = 'home';

const titles = {
  home:'Invitation',
  haldi:'Haldi 🌼',
  mehendi:'Mehendi 💚',
  wedding:'Wedding 💍',
  reception:'Reception 🎉',
  slideshow:'Highlights 🎥',
  lovestory:'Our Story 💞'
};

/* LOAD FIXED */
async function load(){
  const snap = await getDoc(doc(db,'wedding','album'));

  if(snap.exists() && snap.data().data){
    data = JSON.parse(snap.data().data);
  } else {
    data = {home:[], haldi:[], mehendi:[], wedding:[], reception:[]};
  }

  /* ensure sections */
  ['home','haldi','mehendi','wedding','reception'].forEach(k=>{
    if(!data[k]) data[k]=[];
  });

  if(!data.slideshow) data.slideshow=[];
  if(!data.lovestory) data.lovestory=[];

  render();
}

/* NAV */
function renderNav(){
  const nav=document.getElementById("nav");
  nav.innerHTML="";
  Object.keys(data).forEach(k=>{
    const b=document.createElement("button");
    b.textContent=titles[k]||k;
    if(k===current) b.classList.add("active");
    b.onclick=()=>showPage(k);
    nav.appendChild(b);
  });
}

/* PAGES */
function renderPages(){
  const pages=document.getElementById("pages");
  pages.innerHTML="";

  Object.keys(data).forEach(k=>{
    const div=document.createElement("div");
    div.style.display = k===current ? "block":"none";

    if(k==="home"){
      div.innerHTML=`
      <div class="hero">
        <div class="overlay"></div>
        <div class="hero-content">
          <h1>Sammed ❤️ Sahana</h1>
          <button onclick="openMap()">📍 Location</button>
          <button onclick="shareInvite()">💌 Share</button>
        </div>
      </div>`;
    }

    else if(k==="slideshow"){
      div.innerHTML=`<div id="slideshow"></div>`;
    }

    else if(k==="lovestory"){
      div.innerHTML=`
      <div class="timeline">
        <div>💖 First Meet</div>
        <div>🌸 Fell in Love</div>
        <div>💍 Engaged</div>
        <div>👰 Wedding</div>
      </div>`;
    }

    else{
      div.innerHTML=`
      <div class="grid">
        ${data[k].map(i=>`
          <div class="card" onclick="showImage('${i}')">
            <img src="${i}">
          </div>
        `).join("")}
      </div>`;
    }

    pages.appendChild(div);
  });
}

/* PAGE SWITCH */
window.showPage = function(p){
  current=p;
  renderNav();
  renderPages();
  if(p==="slideshow") startSlide();
};

/* SLIDESHOW FIXED */
let index=0;
let slideInterval;

function startSlide(){
  clearInterval(slideInterval);
  const box=document.getElementById("slideshow");

  slideInterval=setInterval(()=>{
    if(!data.slideshow.length) return;
    box.innerHTML=`<img src="${data.slideshow[index]}">`;
    index=(index+1)%data.slideshow.length;
  },2500);
}

/* IMAGE VIEW */
window.showImage=function(src){
  const d=document.createElement("div");
  d.style="position:fixed;inset:0;background:black;display:flex;align-items:center;justify-content:center;";
  d.innerHTML=`<img src="${src}" style="max-width:90%">`;
  d.onclick=()=>d.remove();
  document.body.appendChild(d);
};

/* MAP */
window.openMap=()=>window.open("https://maps.google.com/?q=Terdal Gurukul Kalyan Mantap");

/* SHARE */
window.shareInvite=()=>{
  const text="💖 Sammed & Sahana Wedding 💍 Join us!";
  window.open(`https://wa.me/?text=${encodeURIComponent(text+" "+location.href)}`);
};

/* MUSIC */
const music=document.getElementById("bgMusic");
window.toggleMusic=()=>music.paused?music.play():music.pause();

/* ENVELOPE */
window.openInvite=()=>{
  document.querySelector(".letter").classList.add("open");
  music.play();
  setTimeout(()=>document.getElementById("envelope").remove(),600);
};

/* FLOAT OPTIMIZED */
setInterval(()=>{
  const e=document.createElement("div");
  e.innerHTML="💖";
  e.style=`position:fixed;bottom:0;left:${Math.random()*100}%;animation:float 5s linear;`;
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),5000);
},1500);

load();
</script>

</body>
</html>
