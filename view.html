<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sammed ❤️ Sahana</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;500;600&display=swap');

*{box-sizing:border-box}

body{
  margin:0;
  font-family:Inter;
  background:linear-gradient(180deg,#07070b,#0f0f1a);
  color:white;
}

/* 🌸 TOP HEADER */
header{
  padding:14px;
  text-align:center;
  font-family:'Playfair Display';
  font-size:20px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
  z-index:10;
}

/* 💖 SOFT HERO */
.hero{
  margin:12px;
  height:180px;
  border-radius:18px;
  background:url('https://images.unsplash.com/photo-1523438097201-512ae7d59c0b?q=80') center/cover;
  position:relative;
  overflow:hidden;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.85),transparent);
}

.hero-text{
  position:absolute;
  bottom:12px;
  left:12px;
  font-family:'Playfair Display';
  font-size:18px;
}

/* 💌 INVITATION */
.invite{
  margin:12px;
  padding:18px;
  border-radius:16px;
  background:linear-gradient(135deg,#fff,#ffe4e6);
  color:#111;
  text-align:center;
  box-shadow:0 15px 40px rgba(255,0,80,0.2);
}

.invite h1{
  font-family:'Playfair Display';
  color:#e11d48;
  margin-bottom:6px;
}

/* 🌸 NAV */
.nav{
  display:flex;
  gap:10px;
  padding:10px;
  overflow-x:auto;
  background:rgba(0,0,0,0.8);
  position:sticky;
  top:0;
  z-index:9;
}

.nav button{
  border:none;
  padding:10px 14px;
  border-radius:999px;
  background:#1c1c2a;
  color:white;
  font-weight:600;
  white-space:nowrap;
  transition:.3s;
}

.nav button.active{
  background:#e11d48;
  transform:scale(1.05);
}

/* 📄 PAGE */
.page{display:none}
.page.active{display:block;animation:fade .4s ease}

@keyframes fade{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}

/* 💖 SECTION TITLE */
.title{
  padding:10px 12px;
  font-family:'Playfair Display';
  font-size:18px;
  color:#fda4af;
}

/* 📸 GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:12px;
}

@media(min-width:600px){
  .grid{grid-template-columns:repeat(3,1fr);}
}

/* 🎀 CARD */
.card{
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
  box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.card:hover{
  transform:scale(1.03);
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
}

/* 💫 POPUP */
.popup{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}

.popup img{
  max-width:92%;
  border-radius:12px;
}

/* 🌸 SMALL ANIMATION */
.floating{
  position:fixed;
  width:8px;
  height:8px;
  background:pink;
  border-radius:50%;
  opacity:0.6;
  animation:floatUp 6s linear infinite;
}

@keyframes floatUp{
  from{transform:translateY(100vh)}
  to{transform:translateY(-10vh)}
}
</style>
</head>

<body>

<header>💍 Sammed ❤️ Sahana</header>

<!-- HERO -->
<div class="hero">
  <div class="hero-text">Our Beautiful Love Story ✨</div>
</div>

<!-- INVITE -->
<div class="invite">
  <h1>Wedding Invitation 💖</h1>
  <p>Sammed & Sahana</p>
  <p>📅 June 22 | 📍 Terdal</p>
</div>

<!-- NAV -->
<div class="nav" id="nav"></div>

<!-- CONTENT -->
<div id="content"></div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyCPVPeU7f8kBBJlcq-WURC2YT5rRQoYFVo",
  authDomain:"ss-wedding-e527d.firebaseapp.com",
  projectId:"ss-wedding-e527d"
});

const db=getFirestore(app);

let data={
  home:[],
  haldi:[],
  mehendi:[],
  wedding:[],
  reception:[]
};

let current="home";

const titles={
  home:"Home 💖",
  haldi:"Haldi 🌼",
  mehendi:"Mehendi 💚",
  wedding:"Wedding 💍",
  reception:"Reception 🎉"
};

/* LOAD */
async function load(){
  const snap=await getDoc(doc(db,"wedding","album"));

  if(snap.exists() && snap.data()?.data){
    data=JSON.parse(snap.data().data);
  }

  render();

  setTimeout(()=>{
    document.getElementById("music").play();
  },1500);

  createFlowers();
}

/* NAV */
function nav(){
  const n=document.getElementById("nav");
  n.innerHTML="";

  Object.keys(data).forEach(k=>{
    const b=document.createElement("button");
    b.textContent=titles[k];
    if(k===current) b.classList.add("active");

    b.onclick=()=>{
      current=k;
      render();
    };

    n.appendChild(b);
  });
}

/* CONTENT */
function content(){
  const c=document.getElementById("content");
  c.innerHTML="";

  Object.keys(data).forEach(k=>{
    const d=document.createElement("div");
    d.className=`page ${k===current?'active':''}`;

    d.innerHTML=`
      <div class="title">✨ ${titles[k]}</div>

      <div class="grid">
        ${(data[k]||[]).map(i=>`
          <div class="card" onclick="openImg('${i}')">
            <img src="${i}">
          </div>
        `).join("")}
      </div>
    `;

    c.appendChild(d);
  });
}

/* RENDER */
function render(){
  nav();
  content();
}

/* POPUP */
window.openImg=(src)=>{
  const d=document.createElement("div");
  d.className="popup";
  d.innerHTML=`<img src="${src}">`;
  d.onclick=()=>d.remove();
  document.body.appendChild(d);
};

/* 🌸 FLOATING LOVE EFFECT */
function createFlowers(){
  for(let i=0;i<12;i++){
    const s=document.createElement("div");
    s.className="floating";
    s.style.left=Math.random()*100+"vw";
    s.style.animationDuration=(4+Math.random()*4)+"s";
    document.body.appendChild(s);
  }
}

load();
</script>

</body>
</html>
