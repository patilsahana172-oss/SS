<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SS Wedding Gallery 💖</title>
<style>
body{margin:0;font-family:system-ui;background:linear-gradient(135deg,#fff0f6,#ffe5ec)}
header{text-align:center;padding:24px;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);position:sticky;top:0;z-index:10}
header h1{margin:0;color:#c2185b}
header p{margin:8px 0 0;color:#666}
.section{padding:20px}
.section h2{color:#b0004f}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px}
.card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 8px 20px rgba(0,0,0,.08)}
.card img{width:100%;height:240px;object-fit:cover}
.invite{margin:20px;background:#fff;padding:30px;border-radius:24px;text-align:center;box-shadow:0 10px 25px rgba(0,0,0,.08)}
</style>
</head>
<body>
<header>
  <h1>Sammed ❤️ Sahana</h1>
  <p>Wedding Memories Gallery</p>
</header>
<div class="invite">
  <h2>💌 You're Invited</h2>
  <p>Join us in celebrating our special day</p>
  <h3>📅 June 22</h3>
  <h3>📍 Terdal, Gurukul Kalyan Mantap</h3>
</div>
<div id="gallery"></div>
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';const firebaseConfig = { apiKey: 'AIzaSyCPVPeU7f8kBBJlcq-WURC2YT5rRQoYFVo', authDomain: 'ss-wedding-e527d.firebaseapp.com', projectId: 'ss-wedding-e527d', storageBucket: 'ss-wedding-e527d.firebasestorage.app', messagingSenderId: '447258173537', appId: '1:447258173537:web:03eafc5c74e93405100a20' };

const app = initializeApp(firebaseConfig); const db = getFirestore(app);

const sectionTitles = { haldi: 'Haldi 🌼', mehendi: 'Mehendi 💚', wedding: 'Wedding 💍', reception: 'Reception 🎉' };

async function loadGallery(){ const snap = await getDoc(doc(db,'wedding','album')); if (!snap.exists()) return;

const data = JSON.parse(snap.data().data || '{}'); const gallery = document.getElementById('gallery');

Object.keys(data).forEach(key => { if (key === 'home' || !data[key]?.length) return;

const section = document.createElement('div');
section.className = 'section';
section.innerHTML = `<h2>${sectionTitles[key] || key}</h2><div class="grid" id="${key}Grid"></div>`;
gallery.appendChild(section);

const grid = document.getElementById(`${key}Grid`);
data[key].forEach(img => {
  grid.innerHTML += `<div class="card"><img src="${img}" alt="Wedding memory"></div>`;
});

}); }

loadGallery(); </script>

</body>
</html>
