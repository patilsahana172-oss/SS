<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
</head>
<body>

  <h2>Login Page</h2>

  <form>
    <input type="email" id="email" placeholder="Enter Email" required><br><br>
    <input type="password" id="password" placeholder="Enter Password" required><br><br>

    <button id="login-btn">Login</button>
  </form>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyBuhu2WM0jS55qnS59c87rtuVuF8TK-RkI",
      authDomain: "stories-web-52ddd.firebaseapp.com",
      projectId: "stories-web-52ddd",
      storageBucket: "stories-web-52ddd.firebasestorage.app",
      messagingSenderId: "649630516222",
      appId: "1:649630516222:web:fc99a773dfa3414ceb76af",
      measurementId: "G-YF48HZTSB7"
    };

    // Init Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Login button (ONLY ONE declaration ✅)
    const loginBtn = document.getElementById("login-btn");

    loginBtn.addEventListener("click", function(e) {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          // Redirect
          window.location.href = "home.html";
        })
        .catch(error => {
          alert(error.message);
        });
    });
  </script>

</body>
</html>
