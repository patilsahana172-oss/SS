<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stories App</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#fafafa;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:white;
  border-bottom:1px solid #ddd;
}

/* LEFT SIDE */
.left {
  display:flex;
  align-items:center;
  gap:10px;
}

/* LOGO */
.logo {
  width:40px;
  height:40px;
  border-radius:50%;
  overflow:hidden;
  background:#ddd;
}

.logo img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CAMERA */
.camera {
  font-size:22px;
  cursor:pointer;
}

/* STORIES */
.stories {
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
  background:white;
}

.story {
  position:relative;
}

.story img {
  width:70px;
  height:70px;
  border-radius:50%;
  border:3px solid orange;
  object-fit:cover;
}

/* DELETE */
.del {
  position:absolute;
  top:-5px;
  right:-5px;
  width:20px;
  height:20px;
  border:none;
  border-radius:50%;
  background:red;
  color:white;
  font-size:12px;
  cursor:pointer;
}

/* VIEWER */
#viewer {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  justify-content:center;
  align-items:center;
}

#viewer img {
  width:90%;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

  <div class="left">
    <div class="logo">
      <img id="logoImg" src="">
    </div>

    <div class="camera" onclick="file.click()">📸</div>
  </div>

</div>

<!-- STORIES -->
<div class="stories" id="stories"></div>

<!-- VIEWER -->
<div id="viewer">
  <img id="img">
</div>

<input type="file" id="file" multiple accept="image/*" hidden>

<script>

let userStory = JSON.parse(localStorage.getItem("userStory")) || null;

/* ☁️ CLOUDINARY UPLOAD */
async function uploadImage(file) {

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "nipieidp");

  const res = await fetch(
    "https://api.cloudinary.com/v1_1/dahg3tht7/image/upload",
    {
      method: "POST",
      body: formData
    }
  );

  const data = await res.json();

  if (data.error) {
    alert("Upload failed ❌ " + data.error.message);
    return null;
  }

  return data.secure_url;
}

/* 📤 UPLOAD STORY */
file.onchange = async (e) => {

  const files = [...e.target.files];

  if (files.length > 6) {
    alert("Only 6 images allowed");
    return;
  }

  let urls = [];

  for (let f of files) {
    const url = await uploadImage(f);
    if (url) urls.push(url);
  }

  if (urls.length === 0) return;

  userStory = urls;

  localStorage.setItem("userStory", JSON.stringify(userStory));

  render();

  file.value = "";
};

/* 📥 RENDER */
function render() {

  const c = document.getElementById("stories");
  c.innerHTML = "";

  if (userStory) {

    const div = document.createElement("div");
    div.className = "story";

    div.innerHTML = `
      <img src="${userStory[0]}">
      <button class="del" onclick="deleteStory()">x</button>
    `;

    div.onclick = () => openStory(userStory);

    c.appendChild(div);
  }
}

/* ❌ DELETE STORY */
function deleteStory() {
  userStory = null;
  localStorage.removeItem("userStory");
  render();
}

/* 👀 STORY SLIDESHOW FIXED */
function openStory(images) {

  let i = 0;

  document.getElementById("viewer").style.display = "flex";

  function show() {

    if (i >= images.length) {
      document.getElementById("viewer").style.display = "none";
      return;
    }

    document.getElementById("img").src = images[i];
    i++;

    // ⏱ RULE:
    // 1 image → 4 sec
    // multiple → 3 sec
    let delay = (images.length === 1) ? 4000 : 3000;

    setTimeout(show, delay);
  }

  show();
}

/* INIT */
render();

</script>

</body>
</html>
