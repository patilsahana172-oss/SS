<!DOCTYPE html>
<html>
<head>
  <title>Auth Page</title>
</head>
<body>

  <h2>Login / Signup</h2>

  <form>
    <input type="email" id="email" placeholder="Enter Email" required><br><br>
    <input type="password" id="password" placeholder="Enter Password" required><br><br>

    <button id="signup-btn">Sign Up</button>
    <button id="login-btn">Login</button>
  </form>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyBuhu2WM0jS55qnS59c87rtuVuF8TK-RkI",
      authDomain: "stories-web-52ddd.firebaseapp.com",
      projectId: "stories-web-52ddd",
      storageBucket: "stories-web-52ddd.appspot.com"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Buttons
    const signupBtn = document.getElementById("signup-btn");
    const loginBtn = document.getElementById("login-btn");

    // SIGN UP
    signupBtn.addEventListener("click", function(e) {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      auth.createUserWithEmailAndPassword(email, password)
        .then(() => {
          alert("Signup successful ✅");
        })
        .catch(error => {
          alert(error.message);
        });
    });

    // LOGIN
    loginBtn.addEventListener("click", function(e) {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          // Redirect to home
          window.location.href = "home.html";
        })
        .catch(error => {
          alert(error.message);
        });
    });
  </script>

</body>
</html>
