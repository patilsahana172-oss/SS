<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Stories</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#fafafa;
}

/* HEADER */
.header {
  display:flex;
  justify-content:flex-end;
  align-items:center;
  padding:10px;
  background:white;
  border-bottom:1px solid #ddd;
}

.header-right {
  display:flex;
  align-items:center;
  gap:10px;
}

/* PROFILE */
.profile {
  width:40px;
  height:40px;
  border-radius:50%;
  background:#ddd;
  overflow:hidden;
}

.profile img {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* CAMERA */
.camera {
  width:40px;
  height:40px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:20px;
  background:#f2f2f2;
  cursor:pointer;
}

/* STORIES */
.stories {
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
  background:white;
}

.story {
  text-align:center;
  cursor:pointer;
}

.story img {
  width:70px;
  height:70px;
  border-radius:50%;
  border:3px solid orange;
}

/* STORY VIEW */
#storyView {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#storyView img {
  width:90%;
}

#storyName {
  color:white;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">

  <div class="header-right">

    <!-- PROFILE -->
    <div class="profile">
      <img id="profileImg">
    </div>

    <!-- CAMERA -->
    <div class="camera" onclick="document.getElementById('fileInput').click()">
      📸
    </div>

  </div>

</div>

<!-- STORIES -->
<div class="stories" id="stories"></div>

<!-- STORY VIEW -->
<div id="storyView">
  <img id="storyImg">
  <div id="storyName"></div>
</div>

<!-- FILE INPUT -->
<input type="file" id="fileInput" accept="image/*" multiple hidden>

<script>

// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyD4ADNcYbQwY2Fmzsx6HPqVDyJemDf_Acs",
  authDomain: "ss-app-a0b1c.firebaseapp.com",
  projectId: "ss-app-a0b1c",
  storageBucket: "ss-app-a0b1c.appspot.com",
  messagingSenderId: "665271763423",
  appId: "1:665271763423:web:d16a375f11e1f58140846a"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

// 👤 default profile image
document.getElementById("profileImg").src =
"https://cdn-icons-png.flaticon.com/512/847/847969.png";

// 👤 USER ID
let userId = localStorage.getItem("userId");
if (!userId) {
  userId = "user_" + Math.random().toString(36).substr(2,9);
  localStorage.setItem("userId", userId);
}

// 📥 LOAD STORIES (FIXED)
function loadStories() {

  const container = document.getElementById("stories");

  db.collection("stories")
    .onSnapshot(snapshot => {

      container.innerHTML = "";

      snapshot.forEach(doc => {
        const data = doc.data();

        if (!data.images || data.images.length === 0) return;

        const div = document.createElement("div");
        div.className = "story";

        div.innerHTML = `
          <img src="${data.images[0]}">
          <div>${data.name}</div>
        `;

        div.onclick = () => openStory(data.images, data.name);

        container.appendChild(div);
      });

    });
}

// 📤 UPLOAD STORY (FIXED)
document.getElementById("fileInput").onchange = async (e) => {

  const files = e.target.files;

  if (files.length > 5) {
    alert("Max 5 images allowed");
    return;
  }

  const name = prompt("Enter your name");

  let urls = [];

  for (let file of files) {

    const ref = storage.ref("stories/" + Date.now() + "_" + file.name);

    await ref.put(file);

    const url = await ref.getDownloadURL();
    urls.push(url);
  }

  await db.collection("stories").add({
    name: name || "Guest",
    images: urls,
    userId: userId,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  alert("Uploaded ✅");

  // reset input
  document.getElementById("fileInput").value = "";
};

// 👀 VIEW STORY
function openStory(images, name) {

  let index = 0;

  document.getElementById("storyView").style.display = "flex";
  document.getElementById("storyName").innerText = name;

  function show() {
    if (index >= images.length) {
      document.getElementById("storyView").style.display = "none";
      return;
    }

    document.getElementById("storyImg").src = images[index];
    index++;

    setTimeout(show, 3000);
  }

  show();
}

// 🚀 START
loadStories();

</script>

</body>
</html>
