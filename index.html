<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SS Wedding</title>

<!-- CSS -->
<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fafafa;
}

/* HEADER */
.header {
  position: fixed;
  top: 0;
  width: 100%;
  background: white;
  padding: 10px;
  text-align: center;
  border-bottom: 1px solid #ddd;
}

.logo {
  font-size: 28px;
  font-weight: bold;
  background: linear-gradient(45deg,#ff4081,#ff9800);
  -webkit-background-clip: text;
  color: transparent;
}

/* STORIES */
.stories {
  margin-top: 60px;
  display: flex;
  overflow-x: auto;
  padding: 10px;
  gap: 10px;
}

.story {
  text-align: center;
  cursor: pointer;
}

.story img {
  width: 60px;
  height: 60px;
  border-radius: 50%;
}

/* POSTS */
.posts {
  padding: 10px;
}

.post {
  background: white;
  margin-bottom: 15px;
  border-radius: 10px;
  overflow: hidden;
}

.post img {
  width: 100%;
}

.post__header {
  padding: 10px;
  font-weight: bold;
}

/* CAMERA BUTTON */
#cameraBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: linear-gradient(45deg,#ff4081,#ff9800);
  color: white;
  border: none;
  padding: 15px;
  border-radius: 50%;
  font-size: 20px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">SS</div>
</div>

<!-- STORIES -->
<div class="stories" id="sectionsContainer"></div>

<!-- POSTS -->
<div class="posts" id="postsContainer"></div>

<!-- CAMERA -->
<button id="cameraBtn">📸</button>
<input type="file" id="cameraInput" accept="image/*" capture hidden>

<!-- JS -->
<script>

// ADMIN CONTROL
const isAdmin = true;

// DATA
let sections = ["Haldi", "Mehendi", "Muhurtham"];
let posts = [];

const sectionsContainer = document.getElementById("sectionsContainer");
const postsContainer = document.getElementById("postsContainer");
const cameraBtn = document.getElementById("cameraBtn");
const cameraInput = document.getElementById("cameraInput");

// LOAD SECTIONS
function loadSections() {
  sectionsContainer.innerHTML = "";

  sections.forEach(section => {
    const div = document.createElement("div");
    div.className = "story";

    div.innerHTML = `
      <img src="https://via.placeholder.com/60">
      <div>${section}</div>
    `;

    div.onclick = () => filterPosts(section);

    sectionsContainer.appendChild(div);
  });
}

// LOAD POSTS
function loadPosts(data = posts) {
  postsContainer.innerHTML = "";

  data.forEach(post => {
    const div = document.createElement("div");
    div.className = "post";

    div.innerHTML = `
      <div class="post__header">${post.section}</div>
      <img src="${post.image}">
    `;

    postsContainer.appendChild(div);
  });
}

// FILTER
function filterPosts(section) {
  const filtered = posts.filter(p => p.section === section);
  loadPosts(filtered);
}

// CAMERA
if (!isAdmin) {
  cameraBtn.style.display = "none";
}

cameraBtn.onclick = () => {
  cameraInput.click();
};

cameraInput.onchange = () => {
  const file = cameraInput.files[0];
  if (!file) return;

  let section = prompt("Enter section name");

  if (!section) return;

  if (!sections.includes(section)) {
    sections.push(section);
    loadSections();
  }

  const reader = new FileReader();

  reader.onload = function(e) {
    posts.unshift({
      section: section,
      image: e.target.result
    });

    loadPosts();
  };

  reader.readAsDataURL(file);
};

// INIT
loadSections();
loadPosts();

</script>

</body>
</html>
