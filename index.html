<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stories App</title>

<style>
body { margin:0; font-family:sans-serif; background:#fafafa; }

.header {
  display:flex;
  justify-content:flex-end;
  padding:10px;
  background:white;
  border-bottom:1px solid #ddd;
}

.header-right {
  display:flex;
  gap:10px;
}

.profile, .camera {
  width:40px;
  height:40px;
  border-radius:50%;
  background:#ddd;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

.stories {
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
  background:white;
}

.story img {
  width:70px;
  height:70px;
  border-radius:50%;
  border:3px solid orange;
  object-fit:cover;
}

#viewer {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%;
  height:100%;
  background:black;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#viewer img {
  width:90%;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="header-right">
    <div class="profile">👤</div>
    <div class="camera" onclick="file.click()">📸</div>
  </div>
</div>

<!-- STORIES -->
<div class="stories" id="stories"></div>

<!-- VIEWER -->
<div id="viewer">
  <img id="img">
</div>

<input type="file" id="file" accept="image/*" multiple hidden>

<script>

let stories = [];

// ☁️ UPLOAD FUNCTION (YOUR CLOUDINARY)
async function uploadImage(file) {

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "nipieidp");

  const res = await fetch(
    "https://api.cloudinary.com/v1_1/nipieidp/image/upload",
    {
      method: "POST",
      body: formData
    }
  );

  const data = await res.json();
  return data.secure_url;
}

// 📤 FILE UPLOAD
file.onchange = async (e) => {

  const files = [...e.target.files];

  let urls = [];

  for (let f of files) {
    const url = await uploadImage(f);
    urls.push(url);
  }

  stories.push(urls);
  render();
};

// 📥 RENDER STORIES
function render() {

  const container = document.getElementById("stories");
  container.innerHTML = "";

  stories.forEach((s) => {

    const div = document.createElement("div");
    div.innerHTML = `<img src="${s[0]}">`;

    div.onclick = () => openStory(s);

    container.appendChild(div);
  });
}

// 👀 VIEW STORY
function openStory(images) {

  let i = 0;

  document.getElementById("viewer").style.display = "flex";

  function show() {

    if (i >= images.length) {
      document.getElementById("viewer").style.display = "none";
      return;
    }

    document.getElementById("img").src = images[i];
    i++;

    setTimeout(show, 2500);
  }

  show();
}

</script>

</body>
</html>
