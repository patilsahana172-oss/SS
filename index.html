<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SS</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  background: #000;
  color: white;
}

/* HEADER */
.header {
  position: fixed;
  top: 0;
  width: 100%;
  height: 50px;
  background: #000;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 15px;
  border-bottom: 1px solid #222;
  z-index: 10;
}

.logo {
  font-size: 24px;
  font-weight: bold;
  background: linear-gradient(45deg,#ff4081,#ff9800);
  -webkit-background-clip: text;
  color: transparent;
}

/* STORIES */
.stories {
  margin-top: 55px;
  padding: 10px;
  display: flex;
  gap: 12px;
  overflow-x: auto;
  border-bottom: 1px solid #222;
}

.story {
  text-align: center;
  width: 70px;
}

.story img {
  width: 65px;
  height: 65px;
  border-radius: 50%;
  border: 2px solid #ff4081;
  padding: 2px;
}

.story p {
  font-size: 12px;
  margin-top: 4px;
}

/* POSTS */
.feed {
  padding-bottom: 60px;
}

.post {
  margin-bottom: 20px;
}

.post-header {
  display: flex;
  align-items: center;
  padding: 10px;
}

.post-header img {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  margin-right: 10px;
}

.post-header span {
  font-weight: 600;
  font-size: 14px;
}

.post-img img {
  width: 100%;
}

.post-actions {
  display: flex;
  gap: 15px;
  padding: 10px;
  font-size: 22px;
}

.post-likes {
  padding: 0 10px;
  font-size: 14px;
  font-weight: 600;
}

.post-caption {
  padding: 5px 10px;
  font-size: 14px;
}

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 50px;
  background: #000;
  border-top: 1px solid #222;
  display: flex;
  justify-content: space-around;
  align-items: center;
  font-size: 22px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">SS</div>
  <div>✉️</div>
</div>

<!-- STORIES -->
<div class="stories">
  <div class="story">
    <img src="https://via.placeholder.com/150">
    <p>You</p>
  </div>

  <div class="story">
    <img src="https://via.placeholder.com/150">
    <p>Haldi</p>
  </div>

  <div class="story">
    <img src="https://via.placeholder.com/150">
    <p>Mehendi</p>
  </div>

  <div class="story">
    <img src="https://via.placeholder.com/150">
    <p>Reception</p>
  </div>
</div>

<!-- FEED -->
<div class="feed">

  <div class="post">
    <div class="post-header">
      <img src="https://via.placeholder.com/150">
      <span>SS Wedding</span>
    </div>

    <div class="post-img">
      <img src="https://via.placeholder.com/500">
    </div>

    <div class="post-actions">
      ❤️ 💬 📤
    </div>

    <div class="post-likes">
      120 likes
    </div>

    <div class="post-caption">
      <b>SS Wedding</b> Beautiful moment ❤️
    </div>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  🏠 🔍 ➕ ❤️ 👤
</div>

</body>
</html>
