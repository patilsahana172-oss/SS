<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sammed ❤️ Sahana Wedding</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#ffe0ec,#ffd6a5);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:white;
  position:sticky;
  top:0;
}

.logo{
  width:45px;
  height:45px;
  border-radius:50%;
  background:#ff4d6d;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
}

/* INVITATION */
.invite{
  margin:15px;
  background:white;
  border-radius:20px;
  padding:20px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.names{
  font-size:28px;
  font-weight:800;
  color:#d1004c;
}

/* NAV */
.nav{
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
}

.nav button{
  padding:8px 14px;
  border:none;
  border-radius:20px;
  background:white;
  cursor:pointer;
}

.nav button.active{
  background:#ff4d6d;
  color:white;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card img{
  width:100%;
  border-radius:12px;
}

/* FLOAT BUTTON */
.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#ff4d6d;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:30px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- 🎵 FIXED MUSIC -->
<audio id="music" autoplay loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3" type="audio/mp3">
</audio>

<header>
  <div class="logo">SS</div>
  <button onclick="document.getElementById('file').click()">Upload</button>
</header>

<!-- 💌 INVITATION -->
<div class="invite">
  <h2>💌 Wedding Invitation</h2>
  <div class="names">Sammed ❤️ Sahana</div>
  <p>We invite you to celebrate our special day 💖</p>
  <h3>📅 June 22</h3>
  <h3>📍 Gurukul Kalyan Mantap, Terdal</h3>
</div>

<!-- NAV -->
<div class="nav" id="nav"></div>

<!-- GALLERY -->
<div class="grid" id="grid"></div>

<input type="file" id="file" multiple accept="image/*" hidden>

<div class="fab" onclick="file.click()">+</div>

<script>
const CLOUD_NAME="dahg3tht7";
const UPLOAD_PRESET="nipieidp";

let data = JSON.parse(localStorage.getItem("weddingApp")) || {
  haldi:[],
  mehendi:[],
  wedding:[]
};

let current="haldi";

function renderNav(){
  let nav=document.getElementById("nav");
  nav.innerHTML="";

  Object.keys(data).forEach(k=>{
    let b=document.createElement("button");
    b.innerText=k;
    if(k==current) b.classList.add("active");

    b.onclick=()=>{current=k;render();}

    let del=document.createElement("span");
    del.innerText=" ❌";
    del.style.cursor="pointer";

    del.onclick=(e)=>{
      e.stopPropagation();
      if(confirm("Delete "+k+"?")){
        delete data[k];
        current=Object.keys(data)[0]||"";
        save();
        render();
      }
    }

    b.appendChild(del);
    nav.appendChild(b);
  });
}

function render(){
  renderNav();

  let g=document.getElementById("grid");
  g.innerHTML="";

  (data[current]||[]).forEach(img=>{
    g.innerHTML+=`<div class="card"><img src="${img}"></div>`;
  });
}

file.onchange=async e=>{
  let files=[...e.target.files];

  for(let f of files){
    let form=new FormData();
    form.append("file",f);
    form.append("upload_preset",UPLOAD_PRESET);

    let res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{
      method:"POST",
      body:form
    });

    let j=await res.json();
    data[current].push(j.secure_url);
  }

  save();
  render();
};

function save(){
  localStorage.setItem("weddingApp",JSON.stringify(data));
}

render();
</script>

</body>
</html>
