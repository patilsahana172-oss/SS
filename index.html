<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sammed ❤️ Sahana Wedding App</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#ffe0ec,#ffd6a5);
}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:white;
  position:sticky;
  top:0;
}

.logo{
  width:45px;
  height:45px;
  border-radius:50%;
  background:#ff4d6d;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:bold;
}

/* INVITE */
.invite{
  margin:15px;
  padding:15px;
  background:white;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.names{
  font-size:26px;
  font-weight:800;
  color:#c4004c;
}

/* NAV */
.nav{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px;
}

.nav button{
  padding:8px 12px;
  border:none;
  border-radius:20px;
  background:white;
  cursor:pointer;
}

.nav button.active{
  background:#ff4d6d;
  color:white;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card img{
  width:100%;
  border-radius:12px;
}

/* FLOAT BUTTON */
.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#ff4d6d;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:28px;
}

/* MUSIC BUTTON */
.music{
  position:fixed;
  bottom:90px;
  right:20px;
  background:black;
  color:white;
  padding:10px;
  border-radius:20px;
  font-size:12px;
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">
</audio>

<header>
  <div class="logo">SS</div>
  <button onclick="addSection()">+ Section</button>
</header>

<!-- 💌 INVITATION -->
<div class="invite">
  <div class="names">Sammed ❤️ Sahana</div>
  <p>Wedding Invitation 💖</p>
  <h3>📅 June 22</h3>
  <h3>📍 Gurukul Kalyan Mantap, Terdal</h3>
</div>

<!-- NAV -->
<div class="nav" id="nav"></div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<!-- INPUT -->
<input type="file" id="file" multiple accept="image/*" hidden>

<!-- BUTTONS -->
<div class="fab" onclick="file.click()">+</div>
<div class="music" onclick="startMusic()">🎵 Music</div>

<script>
const CLOUD_NAME="dahg3tht7";
const UPLOAD_PRESET="nipieidp";

let data = JSON.parse(localStorage.getItem("weddingApp")) || {
  haldi:[],
  mehendi:[],
  wedding:[]
};

let current="haldi";
let musicStarted=false;

/* NAV */
function renderNav(){
  let nav=document.getElementById("nav");
  nav.innerHTML="";

  Object.keys(data).forEach(k=>{
    let b=document.createElement("button");
    b.innerText=k;
    if(k===current) b.classList.add("active");

    b.onclick=()=>{current=k;render();}

    let del=document.createElement("span");
    del.innerText=" ❌";
    del.onclick=(e)=>{
      e.stopPropagation();
      delete data[k];
      current=Object.keys(data)[0]||"haldi";
      save();
      render();
    }

    b.appendChild(del);
    nav.appendChild(b);
  });
}

/* ADD SECTION */
function addSection(){
  let name=prompt("Enter section name");
  if(!name) return;

  data[name.toLowerCase()]=[];
  current=name.toLowerCase();
  save();
  render();
}

/* RENDER */
function render(){
  renderNav();

  let g=document.getElementById("grid");
  g.innerHTML="";

  (data[current]||[]).forEach(url=>{
    g.innerHTML+=`<div class="card"><img src="${url}"></div>`;
  });
}

/* UPLOAD */
file.onchange=async e=>{
  let files=[...e.target.files];

  for(let f of files){
    let form=new FormData();
    form.append("file",f);
    form.append("upload_preset",UPLOAD_PRESET);

    let res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{
      method:"POST",
      body:form
    });

    let j=await res.json();
    data[current].push(j.secure_url);
  }

  save();
  render();
};

/* SAVE */
function save(){
  localStorage.setItem("weddingApp",JSON.stringify(data));
}

/* 🎵 FAKE AUTOPLAY MUSIC */
function startMusic(){
  if(!musicStarted){
    document.getElementById("music").play();
    musicStarted=true;
  }
}

/* AUTO START ON ANY ACTION */
document.addEventListener("click",startMusic);
document.addEventListener("touchstart",startMusic);
document.addEventListener("scroll",startMusic);

render();
</script>

</body>
</html>
