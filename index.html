<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SS Wedding Photo Gallery</title>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #fff5f7, #ffe4e6);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      text-align: center;
    }

    h1 {
      color: #b91c1c;
      margin-bottom: 10px;
      font-size: 2.5rem;
    }

    p {
      color: #555;
      margin-bottom: 30px;
    }

    .upload-section {
      margin-bottom: 30px;
    }

    .upload-btn {
      background: #dc2626;
      color: white;
      border: none;
      padding: 15px 30px;
      font-size: 18px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .upload-btn:hover {
      background: #b91c1c;
      transform: scale(1.05);
    }

    .loading {
      display: none;
      margin: 20px 0;
      color: #dc2626;
      font-weight: bold;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .photo-card {
      background: white;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
      transition: transform 0.3s;
    }

    .photo-card:hover {
      transform: translateY(-8px);
    }

    .photo-card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      display: block;
    }

    .photo-info {
      padding: 15px;
      color: #666;
      font-size: 14px;
    }

    @media (max-width: 768px) {
      h1 {
        font-size: 2rem;
      }

      .upload-btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📸 SS Wedding Photo Gallery</h1>
    <p>Upload your beautiful wedding memories and share them with everyone.</p>

    <div class="upload-section">
      <input
        type="file"
        id="photoInput"
        accept="image/*"
        capture="environment"
        hidden
      />
      <button class="upload-btn" onclick="document.getElementById('photoInput').click()">
        Upload Photo
      </button>
    </div>

    <div class="loading" id="loading">
      Uploading photo... Please wait.
    </div>

    <div class="gallery" id="gallery"></div>
  </div>

  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCPVPeU7f8kBBJlcq-WURC2YT5rRQoYFVo",
      authDomain: "ss-wedding-e527d.firebaseapp.com",
      projectId: "ss-wedding-e527d",
      storageBucket: "ss-wedding-e527d.firebasestorage.app",
      messagingSenderId: "447258173537",
      appId: "1:447258173537:web:65642f67ee1f95de100a20",
      measurementId: "G-J3G92FFTEM"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);

    const storage = firebase.storage();
    const db = firebase.firestore();

    const photoInput = document.getElementById("photoInput");
    const gallery = document.getElementById("gallery");
    const loading = document.getElementById("loading");

    // Upload Photo
    photoInput.addEventListener("change", async function () {
      const file = this.files[0];
      if (!file) return;

      try {
        loading.style.display = "block";

        const fileName = Date.now() + "_" + file.name;
        const storageRef = storage.ref("wedding-photos/" + fileName);

        await storageRef.put(file);
        const downloadURL = await storageRef.getDownloadURL();

        await db.collection("photos").add({
          imageUrl: downloadURL,
          fileName: file.name,
          uploadedAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        loading.style.display = "none";
        photoInput.value = "";
      } catch (error) {
        loading.style.display = "none";
        alert("Upload failed: " + error.message);
      }
    });

    // Load Photos in Real Time
    db.collection("photos")
      .orderBy("uploadedAt", "desc")
      .onSnapshot((snapshot) => {
        gallery.innerHTML = "";

        snapshot.forEach((doc) => {
          const photo = doc.data();

          const photoCard = document.createElement("div");
          photoCard.className = "photo-card";

          photoCard.innerHTML = `
            <img src="${photo.imageUrl}" alt="Wedding Photo">
            <div class="photo-info">
              ${photo.fileName || "Wedding Memory"}
            </div>
          `;

          gallery.appendChild(photoCard);
        });
      });
  </script>
</body>
</html>
