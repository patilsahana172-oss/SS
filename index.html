<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sammed ❤️ Sahana Wedding</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#ffe0ec,#ffd6a5);
}

/* HEADER PREMIUM */
header{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:white;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
  z-index:10;
}

.logo{
  width:45px;
  height:45px;
  border-radius:50%;
  background:#ff4d6d;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* MUSIC BUTTON IN HEADER */
.music-btn{
  background:#111;
  color:white;
  border:none;
  padding:8px 12px;
  border-radius:20px;
  font-size:12px;
  cursor:pointer;
}

/* INVITE CARD */
.invite{
  margin:15px;
  padding:18px;
  background:white;
  border-radius:18px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.names{
  font-size:28px;
  font-weight:900;
  color:#c4004c;
}

/* NAV */
.nav{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px;
}

.nav button{
  padding:8px 12px;
  border:none;
  border-radius:20px;
  background:white;
  cursor:pointer;
}

.nav button.active{
  background:#ff4d6d;
  color:white;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card img{
  width:100%;
  border-radius:12px;
}

/* FLOAT BUTTON */
.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:55px;
  height:55px;
  border-radius:50%;
  background:#ff4d6d;
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="music" loop>
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3">
</audio>

<header>
  <div class="logo">SS</div>

  <button class="music-btn" onclick="toggleMusic()">
    🎵 Music
  </button>
</header>

<!-- 💌 INVITATION -->
<div class="invite">
  <div class="names">Sammed ❤️ Sahana</div>
  <p>Wedding Invitation 💖</p>
  <h3>📅 June 22</h3>
  <h3>📍 Gurukul Kalyan Mantap, Terdal</h3>
</div>

<!-- NAV -->
<div class="nav" id="nav"></div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<input type="file" id="file" multiple accept="image/*" hidden>

<div class="fab" onclick="file.click()">+</div>

<script>
const CLOUD_NAME="dahg3tht7";
const UPLOAD_PRESET="nipieidp";

let data = JSON.parse(localStorage.getItem("weddingApp")) || {
  haldi:[],
  mehendi:[],
  wedding:[]
};

let current="haldi";

/* NAV */
function renderNav(){
  let nav=document.getElementById("nav");
  nav.innerHTML="";

  Object.keys(data).forEach(k=>{
    let b=document.createElement("button");
    b.innerText=k;
    if(k===current) b.classList.add("active");

    b.onclick=()=>{current=k;render();}

    let del=document.createElement("span");
    del.innerText=" ❌";
    del.onclick=(e)=>{
      e.stopPropagation();
      delete data[k];
      current=Object.keys(data)[0]||"haldi";
      save();
      render();
    }

    b.appendChild(del);
    nav.appendChild(b);
  });
}

/* RENDER */
function render(){
  renderNav();

  let g=document.getElementById("grid");
  g.innerHTML="";

  (data[current]||[]).forEach(url=>{
    g.innerHTML+=`<div class="card"><img src="${url}"></div>`;
  });
}

/* UPLOAD */
file.onchange=async e=>{
  let files=[...e.target.files];

  for(let f of files){
    let form=new FormData();
    form.append("file",f);
    form.append("upload_preset",UPLOAD_PRESET);

    let res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{
      method:"POST",
      body:form
    });

    let j=await res.json();
    data[current].push(j.secure_url);
  }

  save();
  render();
};

/* SAVE */
function save(){
  localStorage.setItem("weddingApp",JSON.stringify(data));
}

/* 🎵 MUSIC FIX */
let music=document.getElementById("music");
let playing=false;

function toggleMusic(){
  if(!playing){
    music.play();
    playing=true;
  }else{
    music.pause();
    playing=false;
  }
}

/* ALSO START ON FIRST TAP */
document.addEventListener("click",()=>{
  if(!playing){
    music.play().catch(()=>{});
    playing=true;
  }
},{once:true});

render();
</script>

</body>
</html>
