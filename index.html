<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SS Wedding Gallery</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #fff0f5, #ffe4e1);
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: auto;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #c2185b;
            margin-bottom: 10px;
        }

        p {
            margin-bottom: 25px;
            color: #666;
        }

        .upload-btn {
            background: #e91e63;
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
        }

        .upload-btn:hover {
            background: #c2185b;
        }

        #status {
            margin: 20px 0;
            font-weight: bold;
            color: #c2185b;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .photo-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        .photo-card img {
            width: 100%;
            height: 320px;
            object-fit: cover;
            display: block;
        }

        .photo-info {
            padding: 12px;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 SS Wedding Gallery</h1>
        <p>Upload and share beautiful wedding memories with everyone.</p>

        <input type="file" id="photoInput" accept="image/*" capture="environment" hidden>
        <button class="upload-btn" onclick="document.getElementById('photoInput').click()">
            Upload Photo
        </button>

        <div id="status"></div>
        <div class="gallery" id="gallery"></div>
    </div>

    <script>
        const CLOUD_NAME = "dahg3tht7";
        const UPLOAD_PRESET = "nipieidp";

        const photoInput = document.getElementById("photoInput");
        const gallery = document.getElementById("gallery");
        const statusDiv = document.getElementById("status");

        // Load saved photos
        function loadPhotos() {
            const photos = JSON.parse(localStorage.getItem("weddingPhotos")) || [];
            gallery.innerHTML = "";

            photos.reverse().forEach(photoUrl => {
                const card = document.createElement("div");
                card.className = "photo-card";
                card.innerHTML = `
                    <img src="${photoUrl}" alt="Wedding Photo">
                    <div class="photo-info">Wedding Memory</div>
                `;
                gallery.appendChild(card);
            });
        }

        // Upload photo to Cloudinary
        photoInput.addEventListener("change", async function () {
            const file = this.files[0];
            if (!file) return;

            statusDiv.textContent = "Uploading photo...";

            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);

            try {
                const response = await fetch(
                    `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
                    {
                        method: "POST",
                        body: formData
                    }
                );

                const data = await response.json();

                if (data.secure_url) {
                    const photos = JSON.parse(localStorage.getItem("weddingPhotos")) || [];
                    photos.push(data.secure_url);
                    localStorage.setItem("weddingPhotos", JSON.stringify(photos));

                    statusDiv.textContent = "Photo uploaded successfully!";
                    loadPhotos();
                } else {
                    statusDiv.textContent = "Upload failed. Please try again.";
                }
            } catch (error) {
                statusDiv.textContent = "Error uploading photo.";
                console.error(error);
            }

            this.value = "";
        });

        loadPhotos();
    </script>
</body>
</html>
