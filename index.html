<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sammed ♥️ Sahana Wedding</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to bottom, #f8e1e7, #ffffff);
      text-align: center;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    h1 {
      font-size: 2.5rem;
      color: #d4af37;
    }

    p {
      color: #555;
      font-size: 18px;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 25px;
      background: #d4af37;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }

    .sections {
      display: none;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.7);
      margin: 10px;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      cursor: pointer;
      font-size: 18px;
    }
  </style>
</head>

<body>

  <!-- Invitation Screen -->
  <div class="hero" id="home">
    <h1>💍 Sahana ❤️ Sammed</h1>
    <p>We are getting married!</p>
    <p>📅 April 23, 2026</p>
    <button onclick="showSections()">View Events</button>
  </div>

  <!-- Sections -->
  <div class="sections" id="sections">
    <h2>✨ Wedding Events</h2>

    <div class="card">💛 Haldi</div>
    <div class="card">🌿 Mehendi</div>
    <div class="card">🔥 Muhurtam</div>
    <div class="card">🎉 Reception</div>

  </div>

  <script>
    function showSections() {
      document.getElementById('home').style.display = 'none';
      document.getElementById('sections').style.display = 'block';
    }
  </script>

</body>
</html>
