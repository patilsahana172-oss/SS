<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding App 💖</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#ffe4ec,#ffd6a5);
}

/* HEADER NAV BAR */
header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:white;
  overflow-x:auto;
  white-space:nowrap;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

/* LOGO */
.logo{
  min-width:42px;
  height:42px;
  border-radius:50%;
  background:linear-gradient(45deg,#ff4d6d,#ffb3c1);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* BUTTONS */
.tab{
  border:none;
  padding:8px 12px;
  border-radius:20px;
  background:#f5f5f5;
  cursor:pointer;
  font-size:13px;
}

.tab.active{
  background:#ff4d6d;
  color:white;
}

/* MUSIC BUTTON */
.music{
  background:black;
  color:white;
}

/* INVITE */
.invite{
  margin:15px;
  padding:18px;
  background:white;
  border-radius:20px;
  text-align:center;
  box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.names{
  font-size:28px;
  font-weight:900;
  color:#c4004c;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
}

/* FLOAT UPLOAD */
.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#ff4d6d;
  color:white;
  font-size:28px;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>

<body>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/10/16/audio_d0c3f9d6b0.mp3?filename=romantic-110624.mp3">
</audio>

<!-- HEADER WITH EVERYTHING -->
<header id="header"></header>

<!-- INVITE -->
<div class="invite">
  <div class="names">Sammed ❤️ Sahana</div>
  <p>Wedding Invitation 💖</p>
  <h3>📅 June 22</h3>
  <h3>📍 Gurukul Kalyan Mantap</h3>
</div>

<!-- GALLERY -->
<div class="grid" id="grid"></div>

<input type="file" id="file" multiple accept="image/*" hidden>

<div class="fab" onclick="file.click()">+</div>

<script>
const CLOUD_NAME="dahg3tht7";
const UPLOAD_PRESET="nipieidp";

let data = JSON.parse(localStorage.getItem("weddingApp")) || {
  haldi:[],
  mehendi:[],
  wedding:[]
};

let current="haldi";
let music=document.getElementById("music");
let playing=false;

/* HEADER BUILD */
function renderHeader(){
  let h=document.getElementById("header");
  h.innerHTML="";

  // logo
  h.innerHTML+=`<div class="logo">SS</div>`;

  // tabs
  Object.keys(data).forEach(k=>{
    h.innerHTML+=`
      <button class="tab ${k===current?'active':''}" onclick="switchTab('${k}')">
        ${k}
      </button>
    `;
  });

  // add section
  h.innerHTML+=`<button class="tab" onclick="addSection()">+ Add</button>`;

  // music
  h.innerHTML+=`<button class="tab music" onclick="toggleMusic()">🎵</button>`;
}

/* SWITCH */
function switchTab(k){
  current=k;
  render();
}

/* ADD SECTION */
function addSection(){
  let name=prompt("Enter section name");
  if(!name) return;

  data[name.toLowerCase()]=[];
  current=name.toLowerCase();
  save();
  render();
}

/* RENDER */
function render(){
  renderHeader();

  let g=document.getElementById("grid");
  g.innerHTML="";

  (data[current]||[]).forEach(url=>{
    g.innerHTML+=`<div class="card"><img src="${url}"></div>`;
  });
}

/* UPLOAD */
file.onchange=async e=>{
  let files=[...e.target.files];

  for(let f of files){
    let form=new FormData();
    form.append("file",f);
    form.append("upload_preset",UPLOAD_PRESET);

    let res=await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,{
      method:"POST",
      body:form
    });

    let j=await res.json();
    data[current].push(j.secure_url);
  }

  save();
  render();
};

/* SAVE */
function save(){
  localStorage.setItem("weddingApp",JSON.stringify(data));
}

/* MUSIC */
function toggleMusic(){
  if(!playing){
    music.play().catch(()=>{});
    playing=true;
  }else{
    music.pause();
    playing=false;
  }
}

/* AUTO START MUSIC ON FIRST CLICK */
document.addEventListener("click",()=>{
  if(!playing){
    music.play().catch(()=>{});
    playing=true;
  }
},{once:true});

render();
</script>

</body>
</html>
