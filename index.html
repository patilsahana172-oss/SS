<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SS Stories</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

body{
  margin:0;
  font-family:system-ui;
  background:#000;
  color:white;
}

.header{
  padding:12px;
  background:#111;
  display:flex;
  justify-content:space-between;
}

.logo{
  color:#ff2d55;
  font-weight:800;
}

.box{
  padding:15px;
}

input,button{
  padding:10px;
  margin:5px;
  width:90%;
}

.hidden{display:none}

.stories{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px;
}

.story img{
  width:60px;
  height:60px;
  border-radius:50%;
  border:2px solid #ff2d55;
}

#viewer{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  justify-content:center;
  align-items:center;
}

#viewer img{
  width:100%;
}

</style>
</head>

<body>

<div class="header">
  <div class="logo">SS STORIES</div>
</div>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <h3>Enter Mobile Number</h3>
  <input id="mobile" placeholder="Mobile number">
  <button onclick="login()">Login</button>
</div>

<!-- ADMIN LOGIN -->
<div id="adminBox" class="box hidden">
  <h3>Admin Login</h3>
  <input id="auser" placeholder="Username">
  <input id="apass" type="password" placeholder="Password">
  <button onclick="adminLogin()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="stories" id="stories"></div>

</div>

<!-- VIEWER -->
<div id="viewer" onclick="next()">
  <img id="img">
</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBuhu2WM0jS55qnS59c87rtuVuF8TK-RkI",
  authDomain: "stories-web-52ddd.firebaseapp.com",
  projectId: "stories-web-52ddd"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

/* STATE */
let user="";
let story=[];
let index=0;

/* ================= AUTO LOGIN ================= */
window.onload = async function(){

  let saved = localStorage.getItem("user");

  if(saved){
    user = saved;
    loginBox.style.display="none";
    app.classList.remove("hidden");
    loadStories();
  }

}

/* ================= USER LOGIN ================= */
async function login(){

  let m = mobile.value.trim();

  if(!m){
    alert("Enter mobile");
    return;
  }

  let doc = await db.collection("users").doc(m).get();

  if(doc.exists){

    user = m;

    localStorage.setItem("user", m);

    loginBox.style.display="none";
    app.classList.remove("hidden");

    loadStories();

    alert("Login success");

  }else{
    alert("Wrong mobile number");
  }

}

/* ================= ADMIN LOGIN ================= */
function adminLogin(){

  let u = auser.value;
  let p = apass.value;

  if(u==="jai_jinendra" && p==="1234"){

    adminBox.classList.add("hidden");
    app.classList.remove("hidden");

    loadStories();

  }else{
    alert("Wrong admin login");
  }

}

/* ================= LOAD STORIES ================= */
function loadStories(){

  db.collection("stories").onSnapshot(snap=>{

    stories.innerHTML="";

    snap.forEach(doc=>{

      let div=document.createElement("div");
      div.className="story";

      div.innerHTML=`<img src="${doc.data().images[0]}">`;

      div.onclick=()=>open(doc.data().images);

      stories.appendChild(div);
    });

  });

}

/* ================= VIEW STORY ================= */
function open(imgs){

  story = imgs;
  index = 0;

  viewer.style.display="flex";

  show();

}

function show(){
  img.src = story[index];
}

function next(){
  index++;
  if(index>=story.length){
    viewer.style.display="none";
    return;
  }
  show();
}

</script>

</body>
</html>
