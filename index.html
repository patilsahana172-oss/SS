<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stories App</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body { margin:0; font-family:sans-serif; background:#fafafa; }

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:white;
  border-bottom:1px solid #ddd;
}

.left {
  display:flex;
  align-items:center;
  gap:10px;
}

.logo {
  width:40px;
  height:40px;
  border-radius:50%;
  overflow:hidden;
  background:#ddd;
}

.logo img { width:100%; height:100%; object-fit:cover; }

.camera {
  font-size:22px;
  cursor:pointer;
}

/* STORIES */
.stories {
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
  background:white;
}

.story {
  text-align:center;
  cursor:pointer;
}

.story img {
  width:70px;
  height:70px;
  border-radius:50%;
  border:3px solid orange;
  object-fit:cover;
}

.story span {
  font-size:12px;
  display:block;
  margin-top:4px;
}

/* VIEWER */
#viewer {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#viewer img { width:90%; }

#viewerName {
  color:white;
  margin-top:10px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="left">
    <div class="logo"><img src=""></div>
    <div class="camera" onclick="file.click()">📸</div>
  </div>
</div>

<div class="stories" id="stories"></div>

<div id="viewer">
  <img id="img">
  <div id="viewerName"></div>
</div>

<input type="file" id="file" multiple accept="image/*" capture="environment" hidden>

<script>

/* 🔥 FIREBASE */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "stories-web-52ddd.firebaseapp.com",
  projectId: "stories-web-52ddd",
  storageBucket: "stories-web-52ddd.appspot.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ☁️ CLOUDINARY */
const CLOUD = "dahg3tht7";
const PRESET = "nipieidp";

/* LOAD STORIES */
db.collection("stories").orderBy("time","desc")
  .onSnapshot(snapshot => {

    const data = [];
    snapshot.forEach(doc => data.push(doc.data()));
    render(data);

  });

/* UPLOAD IMAGE */
async function uploadImage(file) {

  const form = new FormData();
  form.append("file", file);
  form.append("upload_preset", PRESET);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`,
    {
      method: "POST",
      body: form
    }
  );

  const data = await res.json();
  return data.secure_url;
}

/* UPLOAD STORY */
file.onchange = async (e) => {

  const files = [...e.target.files];

  if (files.length > 6) {
    alert("Max 6 images allowed");
    return;
  }

  let name = prompt("Enter your name:");
  if (!name) return;

  let urls = [];

  for (let f of files) {
    const url = await uploadImage(f);
    urls.push(url);
  }

  await db.collection("stories").add({
    name,
    images: urls,
    time: Date.now()
  });

  file.value = "";
};

/* RENDER */
function render(stories) {

  const c = document.getElementById("stories");
  c.innerHTML = "";

  stories.forEach(s => {

    const div = document.createElement("div");
    div.className = "story";

    div.innerHTML = `
      <img src="${s.images[0]}">
      <span>${s.name}</span>
    `;

    div.onclick = () => openStory(s);

    c.appendChild(div);
  });
}

/* STORY VIEW */
function openStory(s) {

  let i = 0;

  document.getElementById("viewer").style.display = "flex";
  document.getElementById("viewerName").innerText = s.name;

  function show() {

    if (i >= s.images.length) {
      document.getElementById("viewer").style.display = "none";
      return;
    }

    document.getElementById("img").src = s.images[i];
    i++;

    setTimeout(show, 3000);
  }

  show();
}

</script>

</body>
</html>
