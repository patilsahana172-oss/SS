<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stories App</title>

<style>
body {
  margin:0;
  font-family:sans-serif;
  background:#fafafa;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:white;
  border-bottom:1px solid #ddd;
}

.left {
  display:flex;
  align-items:center;
  gap:10px;
}

.logo {
  width:40px;
  height:40px;
  border-radius:50%;
  overflow:hidden;
  background:#ddd;
}

.logo img {
  width:100%;
  height:100%;
  object-fit:cover;
}

.camera {
  font-size:22px;
  cursor:pointer;
}

/* STORIES */
.stories {
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
  background:white;
}

.story {
  text-align:center;
}

.story img {
  width:70px;
  height:70px;
  border-radius:50%;
  border:3px solid orange;
  object-fit:cover;
}

.story span {
  font-size:12px;
  display:block;
  margin-top:4px;
}

/* VIEW */
#viewer {
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#viewer img {
  width:90%;
}

#viewerName {
  color:white;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="left">
    <div class="logo">
      <img id="logoImg" src="">
    </div>
    <div class="camera" onclick="file.click()">📸</div>
  </div>
</div>

<div class="stories" id="stories"></div>

<div id="viewer">
  <img id="img">
  <div id="viewerName"></div>
</div>

<input type="file" id="file" multiple accept="image/*" capture="environment" hidden>

<script>

const CLOUD = "dahg3tht7";
const PRESET = "nipieidp";

let stories = []; // global from cloud

/* ☁️ LOAD STORIES FROM CLOUD */
async function loadStories() {

  const res = await fetch(
    `https://res.cloudinary.com/${CLOUD}/raw/upload/stories.json`
  );

  if (res.ok) {
    stories = await res.json();
  }

  render();
}

/* ☁️ SAVE STORIES TO CLOUD */
async function saveStories() {

  const blob = new Blob(
    [JSON.stringify(stories)],
    { type: "application/json" }
  );

  const form = new FormData();
  form.append("file", blob);
  form.append("upload_preset", PRESET);
  form.append("resource_type", "raw");

  await fetch(
    `https://api.cloudinary.com/v1_1/${CLOUD}/raw/upload`,
    {
      method: "POST",
      body: form
    }
  );
}

/* 📤 UPLOAD IMAGE */
async function uploadImage(file) {

  const form = new FormData();
  form.append("file", file);
  form.append("upload_preset", PRESET);

  const res = await fetch(
    `https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`,
    {
      method: "POST",
      body: form
    }
  );

  const data = await res.json();

  return data.secure_url;
}

/* 📸 UPLOAD STORY */
file.onchange = async (e) => {

  const files = [...e.target.files];

  if (files.length > 6) {
    alert("Max 6 images");
    return;
  }

  let name = prompt("Enter your name:");
  if (!name) return;

  let urls = [];

  for (let f of files) {
    const url = await uploadImage(f);
    urls.push(url);
  }

  const story = {
    id: Date.now(),
    name,
    images: urls
  };

  stories.push(story);

  await saveStories();

  render();

  file.value = "";
};

/* 📥 RENDER */
function render() {

  const c = document.getElementById("stories");
  c.innerHTML = "";

  stories.forEach(s => {

    const div = document.createElement("div");
    div.className = "story";

    div.innerHTML = `
      <img src="${s.images[0]}">
      <span>${s.name}</span>
    `;

    div.onclick = () => openStory(s);

    c.appendChild(div);
  });
}

/* 👀 VIEW STORY */
function openStory(story) {

  let i = 0;

  document.getElementById("viewer").style.display = "flex";
  document.getElementById("viewerName").innerText = story.name;

  function show() {

    if (i >= story.images.length) {
      document.getElementById("viewer").style.display = "none";
      return;
    }

    document.getElementById("img").src = story.images[i];
    i++;

    setTimeout(show, 3000);
  }

  show();
}

/* START */
loadStories();

</script>

</body>
</html>
