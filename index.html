<!DOCTYPE html>
<html>
<head>
  <title>Firebase Auth - Single Page</title>
</head>
<body>

  <h2>Firebase Auth Demo</h2>

  <!-- Form -->
  <form>
    <input type="email" id="email" placeholder="Enter Email" required><br><br>
    <input type="password" id="password" placeholder="Enter Password" required><br><br>

    <button id="signup-btn">Sign Up</button>
    <button id="login-btn">Login</button>
    <button id="logout-btn">Logout</button>
  </form>

  <h3 id="status">Status: Not Logged In</h3>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

  <script>
    // Your Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyBuhu2WM0jS55qnS59c87rtuVuF8TK-RkI",
      authDomain: "stories-web-52ddd.firebaseapp.com",
      projectId: "stories-web-52ddd",
      storageBucket: "stories-web-52ddd.firebasestorage.app",
      messagingSenderId: "649630516222",
      appId: "1:649630516222:web:fc99a773dfa3414ceb76af",
      measurementId: "G-YF48HZTSB7"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Elements
    const signupBtn = document.getElementById("signup-btn");
    const loginBtn = document.getElementById("login-btn");
    const logoutBtn = document.getElementById("logout-btn");
    const status = document.getElementById("status");

    // SIGN UP
    signupBtn.addEventListener("click", function(e) {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      auth.createUserWithEmailAndPassword(email, password)
        .then(() => {
          alert("User Signed Up ✅");
        })
        .catch(error => {
          alert(error.message);
        });
    });

    // LOGIN
    loginBtn.addEventListener("click", function(e) {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      auth.signInWithEmailAndPassword(email, password)
        .then(() => {
          alert("Login Success ✅");
        })
        .catch(error => {
          alert(error.message);
        });
    });

    // LOGOUT
    logoutBtn.addEventListener("click", function(e) {
      e.preventDefault();

      auth.signOut().then(() => {
        alert("Logged Out ✅");
      });
    });

    // AUTH STATE
    auth.onAuthStateChanged(user => {
      if (user) {
        status.innerText = "Logged in: " + user.email;
      } else {
        status.innerText = "Not Logged In";
      }
    });

  </script>

</body>
</html>
