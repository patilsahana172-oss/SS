<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SS Wedding</title>

<!-- ✅ Firebase OLD VERSION (COMPATIBLE) -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #fafafa;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 15px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.title {
  font-size: 20px;
  font-weight: bold;
}

.logo {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  background: #eee;
}

/* STORIES */
.stories {
  display: flex;
  overflow-x: auto;
  padding: 10px;
  gap: 12px;
  background: white;
}

.story {
  text-align: center;
}

.story img {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  padding: 3px;
  background: linear-gradient(45deg, #ff004f, #ff9900);
}

.story span {
  font-size: 12px;
}

.add-story {
  background: #ddd !important;
}

/* STORY VIEW */
#storyView {
  display: none;
  position: fixed;
  top: 0;
  width: 100%;
  height: 100%;
  background: black;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

#storyView img {
  width: 90%;
}

#storyName {
  color: white;
  margin-top: 10px;
}

/* BUTTONS */
button {
  margin: 5px;
  padding: 8px 12px;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">Sahana ❤️ Sammed</div>
  <div class="logo"></div>
</div>

<div class="stories" id="stories"></div>

<div id="storyView">
  <img id="storyImg">
  <div id="storyName"></div>

  <button id="deleteImageBtn" onclick="deleteImage()">Delete Image</button>
  <button id="deleteStoryBtn" onclick="deleteStory()">Delete Story</button>
</div>

<input type="file" id="fileInput" hidden multiple>

<script>

/* 🔥 FIREBASE CONFIG (YOURS) */
const firebaseConfig = {
  apiKey: "AIzaSyD4ADNcYbQwY2Fmzsx6HPqVDyJemDf_Acs",
  authDomain: "ss-app-a0b1c.firebaseapp.com",
  projectId: "ss-app-a0b1c",
  storageBucket: "ss-app-a0b1c.appspot.com",
  messagingSenderId: "665271763423",
  appId: "1:665271763423:web:833be07fae1d320040846a"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

/* 👤 UNIQUE USER ID */
let userId = localStorage.getItem("userId");
if (!userId) {
  userId = "user_" + Math.random().toString(36).substr(2, 9);
  localStorage.setItem("userId", userId);
}

const storiesDiv = document.getElementById("stories");
const fileInput = document.getElementById("fileInput");

/* 📥 LOAD STORIES */
function loadStories() {
  db.collection("stories")
    .orderBy("createdAt", "desc")
    .onSnapshot(snapshot => {

      storiesDiv.innerHTML = "";

      // ADD BUTTON
      storiesDiv.innerHTML += `
        <div class="story" id="addStory">
          <img class="add-story" src="https://via.placeholder.com/150">
          <span>Add</span>
        </div>
      `;

      snapshot.forEach(doc => {
        const s = doc.data();

        storiesDiv.innerHTML += `
          <div class="story">
            <img src="${s.images[0]}"
              onclick="openStory(${JSON.stringify(s.images)}, '${s.name}', '${doc.id}', '${s.userId}')">
            <span>${s.name}</span>
          </div>
        `;
      });

      document.getElementById("addStory").onclick = () => {
        fileInput.click();
      };
    });
}

/* 📸 ADD STORY */
fileInput.onchange = async (e) => {
  const files = e.target.files;

  if (files.length > 5) {
    alert("Max 5 images allowed");
    return;
  }

  const name = prompt("Enter your name");

  // CHECK IF ALREADY ADDED
  const existing = await db.collection("stories")
    .where("userId", "==", userId)
    .get();

  if (!existing.empty) {
    alert("You already added a story");
    return;
  }

  let urls = [];

  for (let file of files) {
    const ref = storage.ref("stories/" + Date.now() + file.name);
    await ref.put(file);
    const url = await ref.getDownloadURL();
    urls.push(url);
  }

  await db.collection("stories").add({
    name: name || "Guest",
    images: urls,
    userId: userId,
    createdAt: new Date()
  });
};

/* 👀 VIEW STORY */
let currentImages = [];
let currentIndex = 0;
let currentDocId = "";

function openStory(images, name, docId, storyUserId) {
  currentImages = images;
  currentIndex = 0;
  currentDocId = docId;

  document.getElementById("storyName").innerText = name;

  // SHOW DELETE ONLY FOR OWNER
  if (userId === storyUserId) {
    deleteImageBtn.style.display = "block";
    deleteStoryBtn.style.display = "block";
  } else {
    deleteImageBtn.style.display = "none";
    deleteStoryBtn.style.display = "none";
  }

  document.getElementById("storyView").style.display = "flex";

  showNext();
}

function showNext() {
  if (currentIndex >= currentImages.length) {
    document.getElementById("storyView").style.display = "none";
    return;
  }

  document.getElementById("storyImg").src = currentImages[currentIndex];
  currentIndex++;

  setTimeout(showNext, 3000);
}

/* ❌ DELETE IMAGE */
async function deleteImage() {
  currentImages.splice(currentIndex - 1, 1);

  if (currentImages.length === 0) {
    await deleteStory();
    return;
  }

  await db.collection("stories").doc(currentDocId).update({
    images: currentImages
  });

  alert("Image deleted");
}

/* ❌ DELETE STORY */
async function deleteStory() {
  await db.collection("stories").doc(currentDocId).delete();

  document.getElementById("storyView").style.display = "none";

  alert("Story deleted");
}

/* 🚀 INIT */
loadStories();

</script>

</body>
</html>
