<!DOCTYPE html>
<html>
<head>
  <title>Auth Page</title>
</head>
<body>

<h2>Login / Signup</h2>

<form>
  <input type="email" id="email" placeholder="Enter Email" required><br><br>
  <input type="password" id="password" placeholder="Enter Password" required><br><br>

  <button id="signup-btn">Sign Up</button>
  <button id="login-btn">Login</button>
</form>

<!-- Firebase v10 -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyD4ADNcYbQwY2Fmzsx6HPqVDyJemDf_Acs",
  authDomain: "ss-app-a0b1c.firebaseapp.com",
  projectId: "ss-app-a0b1c",
  storageBucket: "ss-app-a0b1c.appspot.com"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

const signupBtn = document.getElementById("signup-btn");
const loginBtn = document.getElementById("login-btn");

signupBtn.onclick = async (e) => {
  e.preventDefault();
  try {
    await auth.createUserWithEmailAndPassword(
      email.value,
      password.value
    );
    alert("Signup successful ✅");
  } catch (err) {
    alert(err.message);
  }
};

loginBtn.onclick = async (e) => {
  e.preventDefault();
  try {
    await auth.signInWithEmailAndPassword(
      email.value,
      password.value
    );
    window.location.href = "home.html";
  } catch (err) {
    alert(err.message);
  }
};
</script>

</body>
</html>
