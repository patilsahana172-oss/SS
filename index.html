<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SS</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, sans-serif;
  background: #000;
  color: white;
}

/* HEADER */
.header {
  height: 55px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 15px;
  border-bottom: 1px solid #222;
}

.logo {
  font-size: 24px;
  font-weight: bold;
}

/* RIGHT PROFILE IMAGE */
.profile-pic {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  background: gray;
  overflow: hidden;
}

.profile-pic img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* STORIES */
.stories {
  display: flex;
  gap: 12px;
  padding: 10px;
  overflow-x: auto;
}

.story {
  text-align: center;
  width: 70px;
  cursor: pointer;
}

.story img {
  width: 65px;
  height: 65px;
  border-radius: 50%;
  border: 2px solid #ff4081;
  padding: 2px;
}

.story span {
  font-size: 12px;
}

/* STORY VIEW */
.story-view {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
}

.story-view img {
  width: 100%;
  max-height: 80%;
}

.story-name {
  position: absolute;
  bottom: 30px;
  font-size: 18px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">SS</div>

  <div class="profile-pic">
    <!-- later you add image url here -->
    <!-- <img src="your-image-url"> -->
  </div>
</div>

<!-- STORIES -->
<div class="stories" id="stories"></div>

<!-- STORY VIEW -->
<div class="story-view" id="storyView">
  <img id="storyImg">
  <div class="story-name" id="storyName"></div>
</div>

<!-- FILE INPUT -->
<input type="file" id="fileInput" hidden>

<script>

let stories = [];

const storiesDiv = document.getElementById("stories");
const fileInput = document.getElementById("fileInput");

// LOAD STORIES
function loadStories() {
  storiesDiv.innerHTML = "";

  // ADD STORY BUTTON
  storiesDiv.innerHTML += `
    <div class="story" id="addStory">
      <img src="https://via.placeholder.com/150">
      <span>+</span>
    </div>
  `;

  // USER STORIES
  stories.forEach((s, index) => {
    storiesDiv.innerHTML += `
      <div class="story" onclick="openStory(${index})">
        <img src="${s.image}">
        <span>${s.name}</span>
      </div>
    `;
  });

  document.getElementById("addStory").onclick = () => {
    fileInput.click();
  };
}

// ADD STORY
fileInput.onchange = (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const name = prompt("Enter your name");

  const reader = new FileReader();

  reader.onload = function(ev) {
    stories.unshift({
      image: ev.target.result,
      name: name || "Guest"
    });

    loadStories();
  };

  reader.readAsDataURL(file);
};

// STORY VIEW
function openStory(index) {
  const story = stories[index];

  const view = document.getElementById("storyView");
  const img = document.getElementById("storyImg");
  const name = document.getElementById("storyName");

  img.src = story.image;
  name.innerText = story.name;

  view.style.display = "flex";

  // AUTO CLOSE AFTER 3 SEC
  setTimeout(() => {
    view.style.display = "none";
  }, 3000);
}

// INIT
loadStories();

</script>

</body>
</html>
