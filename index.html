<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width">
<title>Admin 💖</title>

<style>
body{font-family:system-ui;background:#fff1f2;margin:0}
header{background:#e11d48;color:white;text-align:center;padding:10px}
.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px}
img{width:100%;border-radius:10px}
</style>
</head>

<body>

<header>Upload Photos 💖</header>
<input type="file" id="file" multiple>

<div id="gallery" class="grid"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const app = initializeApp({
  apiKey:'AIzaSyCPVPeU7f8kBBJlcq-WURC2YT5rRQoYFVo',
  projectId:'ss-wedding-e527d'
});
const db = getFirestore(app);

let data={wedding:[]};

async function load(){
  const s=await getDoc(doc(db,'wedding','album'));
  if(s.exists() && s.data().data){
    data=JSON.parse(s.data().data);
  }
  if(!data.wedding) data.wedding=[];
  render();
}

function render(){
  document.getElementById("gallery").innerHTML=
    data.wedding.map(i=>`<img src="${i}">`).join("");
}

document.getElementById("file").onchange=async e=>{
  for(const f of e.target.files){
    const form=new FormData();
    form.append("file",f);
    form.append("upload_preset","nipieidp");

    const res=await fetch("https://api.cloudinary.com/v1_1/dahg3tht7/image/upload",{method:"POST",body:form});
    const json=await res.json();
    data.wedding.push(json.secure_url);
  }

  await setDoc(doc(db,'wedding','album'),{data:JSON.stringify(data)});
  render();
};

load();
</script>

</body>
</html>
