<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Stories</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>

<style>
body { margin:0; font-family:sans-serif; background:#fafafa; }

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:10px;
  background:white;
  border-bottom:1px solid #ddd;
}

.stories {
  display:flex;
  overflow-x:auto;
  gap:10px;
  padding:10px;
  background:white;
}

.story { text-align:center; cursor:pointer; }

.story img {
  width:70px;
  height:70px;
  border-radius:50%;
  border:3px solid orange;
}

#storyView {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:black;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#storyView img { width:90%; }
#storyName { color:white; margin-top:10px; }
</style>
</head>

<body>

<div class="header">
  <h3>Sahana ❤️ Sammed</h3>
</div>

<div class="stories" id="stories"></div>

<div id="storyView">
  <img id="storyImg">
  <div id="storyName"></div>
</div>

<input type="file" id="fileInput" accept="image/*" multiple hidden>

<script>

// ✅ Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyD4ADNcYbQwY2Fmzsx6HPqVDyJemDf_Acs",
  authDomain: "ss-app-a0b1c.firebaseapp.com",
  projectId: "ss-app-a0b1c",
  storageBucket: "ss-app-a0b1c.appspot.com",
  messagingSenderId: "665271763423",
  appId: "1:665271763423:web:d16a375f11e1f58140846a"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();

// 👤 unique user
let userId = localStorage.getItem("userId");
if (!userId) {
  userId = "user_" + Math.random().toString(36).substr(2,9);
  localStorage.setItem("userId", userId);
}

// 📥 LOAD STORIES
function loadStories() {
  const container = document.getElementById("stories");

  db.collection("stories")
    .orderBy("createdAt", "desc")
    .onSnapshot(snapshot => {

      container.innerHTML = "";

      // ADD BUTTON
      const add = document.createElement("div");
      add.className = "story";
      add.innerHTML = `
        <img src="https://cdn-icons-png.flaticon.com/512/1828/1828817.png">
        <div>Add</div>
      `;
      add.onclick = () => document.getElementById("fileInput").click();
      container.appendChild(add);

      // STORIES
      snapshot.forEach(doc => {
        const data = doc.data();

        const div = document.createElement("div");
        div.className = "story";

        div.innerHTML = `
          <img src="${data.images[0]}">
          <div>${data.name}</div>
        `;

        div.onclick = () => openStory(data.images, data.name);

        container.appendChild(div);
      });

    });
}

// 📤 UPLOAD STORY
document.getElementById("fileInput").onchange = async (e) => {

  const files = e.target.files;

  if (files.length > 5) {
    alert("Max 5 images allowed");
    return;
  }

  const name = prompt("Enter your name");

  // one story per user
  const existing = await db.collection("stories")
    .where("userId","==",userId)
    .get();

  if (!existing.empty) {
    alert("You already uploaded story");
    return;
  }

  let urls = [];

  for (let file of files) {
    const ref = storage.ref("stories/" + Date.now() + "_" + file.name);
    await ref.put(file);
    const url = await ref.getDownloadURL();
    urls.push(url);
  }

  await db.collection("stories").add({
    name: name || "Guest",
    images: urls,
    userId: userId,
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  });

  alert("Uploaded ✅");
};

// 👀 VIEW STORY
function openStory(images, name) {

  let index = 0;

  document.getElementById("storyView").style.display = "flex";
  document.getElementById("storyName").innerText = name;

  function show() {
    if (index >= images.length) {
      document.getElementById("storyView").style.display = "none";
      return;
    }

    document.getElementById("storyImg").src = images[index];
    index++;

    setTimeout(show, 3000);
  }

  show();
}

// START
loadStories();

</script>

</body>
</html>
