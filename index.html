<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SS Wedding</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fafafa;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  background: white;
  border-bottom: 1px solid #ddd;
}

.logo {
  font-size: 22px;
  font-weight: bold;
  color: #d4af37;
}

/* STORIES */
.stories {
  display: flex;
  overflow-x: auto;
  padding: 10px;
  background: white;
}

.story {
  text-align: center;
  margin-right: 10px;
}

.story-circle {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  background: linear-gradient(45deg, pink, gold);
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

/* POSTS */
.post {
  background: white;
  margin-top: 10px;
}

.post-header {
  display: flex;
  align-items: center;
  padding: 10px;
}

.profile {
  width: 35px;
  height: 35px;
  border-radius: 50%;
  background: gold;
  margin-right: 10px;
}

.post-img {
  width: 100%;
}

.actions {
  padding: 10px;
  font-size: 22px;
  cursor: pointer;
}

.likes {
  padding: 0 10px;
  font-weight: bold;
  display: none;
}

.caption {
  padding: 5px 10px;
}

.comment-box {
  padding: 10px;
}

input {
  width: 80%;
  padding: 8px;
  border-radius: 20px;
  border: 1px solid #ccc;
}

button {
  padding: 8px 12px;
  border: none;
  background: #d4af37;
  color: white;
  border-radius: 20px;
  margin-left: 5px;
}
</style>

</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">SS 💍</div>
</div>

<!-- STORIES -->
<div class="stories">
  <div class="story"><div class="story-circle">Haldi</div></div>
  <div class="story"><div class="story-circle">Mehendi</div></div>
  <div class="story"><div class="story-circle">Muhurtam</div></div>
</div>

<!-- POST -->
<div class="post">
  <div class="post-header">
    <div class="profile"></div>
    <b>admin</b>
  </div>

  <img class="post-img" src="https://images.unsplash.com/photo-1606800052052-a08af7148866"/>

  <div class="actions">
    <span onclick="likePost(this)">❤️</span>
  </div>

  <div class="likes">1 like</div>

  <div class="caption">
    <b>admin</b> Haldi Moments 💛
  </div>

  <!-- COMMENT -->
  <div class="comment-box">
    <input type="text" placeholder="Add comment..." />
    <button onclick="addComment(this)">Post</button>
  </div>

  <div class="comments"></div>
</div>

<script>
function likePost(el) {
  let likes = el.parentElement.nextElementSibling;
  likes.style.display = "block";
}

function addComment(btn) {
  let input = btn.previousElementSibling;
  let text = input.value;

  if (text.trim() === "") return;

  let commentDiv = btn.parentElement.nextElementSibling;

  let p = document.createElement("p");
  p.textContent = text;

  commentDiv.appendChild(p);
  input.value = "";
}
</script>

</body>
</html>
