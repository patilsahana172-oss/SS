<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SS Wedding Gallery</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-storage-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #fff1f2, #ffe4e6);
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      text-align: center;
    }

    h1 {
      color: #be123c;
      margin-bottom: 10px;
      font-size: 2.5rem;
    }

    p {
      color: #555;
      margin-bottom: 30px;
    }

    .upload-btn {
      background: #e11d48;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 10px;
      font-size: 18px;
      cursor: pointer;
      margin-bottom: 20px;
    }

    .upload-btn:hover {
      background: #be123c;
    }

    #status {
      margin: 15px 0;
      color: #be123c;
      font-weight: bold;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .photo-card {
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12);
    }

    .photo-card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      display: block;
    }

    .photo-info {
      padding: 12px;
      font-size: 14px;
      color: #444;
    }

    .empty-message {
      grid-column: 1 / -1;
      font-size: 18px;
      color: #777;
      margin-top: 30px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📸 SS Wedding Gallery</h1>
    <p>Upload and share your beautiful wedding memories.</p>

    <input
      type="file"
      id="photoInput"
      accept="image/*"
      capture="environment"
      hidden
    />

    <button class="upload-btn" onclick="document.getElementById('photoInput').click()">
      Upload Photo
    </button>

    <div id="status"></div>
    <div class="gallery" id="gallery"></div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCPVPeU7f8kBBJlcq-WURC2YT5rRQoYFVo",
      authDomain: "ss-wedding-e527d.firebaseapp.com",
      projectId: "ss-wedding-e527d",
      storageBucket: "ss-wedding-e527d.firebasestorage.app",
      messagingSenderId: "447258173537",
      appId: "1:447258173537:web:65642f67ee1f95de100a20"
    };

    firebase.initializeApp(firebaseConfig);

    const storage = firebase.storage();
    const db = firebase.firestore();

    const photoInput = document.getElementById("photoInput");
    const gallery = document.getElementById("gallery");
    const statusDiv = document.getElementById("status");

    // Upload image
    photoInput.addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      try {
        statusDiv.textContent = "Uploading photo...";

        const fileName = Date.now() + "_" + file.name;
        const storageRef = storage.ref().child("wedding-photos/" + fileName);

        await storageRef.put(file);
        const imageUrl = await storageRef.getDownloadURL();

        await db.collection("photos").add({
          imageUrl: imageUrl,
          fileName: file.name,
          uploadedAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        statusDiv.textContent = "Photo uploaded successfully!";
        photoInput.value = "";

        setTimeout(() => {
          statusDiv.textContent = "";
        }, 3000);

      } catch (error) {
        console.error(error);
        statusDiv.textContent = "Upload failed. Please try again.";
      }
    });

    // Load photos permanently from Firestore
    function loadPhotos() {
      db.collection("photos")
        .orderBy("uploadedAt", "desc")
        .onSnapshot((snapshot) => {
          gallery.innerHTML = "";

          if (snapshot.empty) {
            gallery.innerHTML = `
              <div class="empty-message">
                No photos uploaded yet. Be the first to upload one!
              </div>
            `;
            return;
          }

          snapshot.forEach((doc) => {
            const photo = doc.data();

            const card = document.createElement("div");
            card.className = "photo-card";

            card.innerHTML = `
              <img src="${photo.imageUrl}" alt="Wedding Photo">
              <div class="photo-info">${photo.fileName || "Wedding Memory"}</div>
            `;

            gallery.appendChild(card);
          });
        }, (error) => {
          console.error("Error loading photos:", error);
          gallery.innerHTML = `
            <div class="empty-message">
              Unable to load photos. Please check Firebase setup.
            </div>
          `;
        });
    }

    loadPhotos();
  </script>
</body>
</html>
