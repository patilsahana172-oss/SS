<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SS Stories</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

body{
  margin:0;
  font-family:system-ui;
  background:#000;
  color:white;
}

/* HEADER (YOUR OLD STYLE KEEP SIMPLE) */
.header{
  padding:12px;
  background:#111;
  display:flex;
  justify-content:space-between;
}

.logo{
  font-weight:800;
  color:#ff2d55;
}

/* BOX */
.box{
  padding:15px;
}

input,button{
  padding:10px;
  margin:5px;
  width:90%;
}

/* STORIES */
.stories{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px;
  background:#111;
}

.story img{
  width:60px;
  height:60px;
  border-radius:50%;
  border:2px solid #ff2d55;
  object-fit:cover;
}

/* VIEWER */
#viewer{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  justify-content:center;
  align-items:center;
}

#viewer img{
  width:100%;
  max-height:100vh;
  object-fit:contain;
}

/* FOOTER */
.footer{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#111;
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #333;
}

/* HIDE */
.hidden{display:none}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">SS STORIES</div>
</div>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <h3>Enter Mobile Number</h3>
  <input id="mobile" placeholder="Mobile number">
  <button onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div id="adminBox" class="box hidden">
  <h3>Admin Login</h3>
  <input id="auser" placeholder="Username">
  <input id="apass" type="password" placeholder="Password">
  <button onclick="adminLogin()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <div class="stories" id="stories"></div>

  <div class="box">
    <h4>Upload Story</h4>
    <input type="file" id="file" multiple>
    <button onclick="upload()">Upload</button>
  </div>

</div>

<!-- VIEWER -->
<div id="viewer" onclick="next()">
  <img id="img">
</div>

<!-- FOOTER -->
<div class="footer">
  <div>🏠 Home</div>
  <div>➕ Upload</div>
  <div>❤️</div>
  <div>👤 Profile</div>
</div>

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyBuhu2WM0jS55qnS59c87rtuVuF8TK-RkI",
  authDomain: "stories-web-52ddd.firebaseapp.com",
  projectId: "stories-web-52ddd"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

/* STATE */
let user="";
let story=[];
let index=0;

/* ================= AUTO LOGIN ================= */
window.onload = function(){

  let saved = localStorage.getItem("user");

  if(saved){
    user = saved;

    loginBox.style.display="none";
    app.classList.remove("hidden");

    loadStories();
  }

}

/* ================= LOGIN (AUTO REGISTER) ================= */
async function login(){

  let m = mobile.value.trim();

  if(!m){
    alert("Enter mobile number");
    return;
  }

  let ref = db.collection("users").doc(m);
  let doc = await ref.get();

  if(!doc.exists){
    await ref.set({ createdAt: Date.now() });
  }

  user = m;

  localStorage.setItem("user", m);

  loginBox.style.display="none";
  app.classList.remove("hidden");

  loadStories();

}

/* ================= ADMIN ================= */
function adminLogin(){

  let u = auser.value;
  let p = apass.value;

  if(u==="jai_jinendra" && p==="1234"){

    adminBox.classList.add("hidden");
    app.classList.remove("hidden");

    loadStories();

  }else{
    alert("Wrong admin login");
  }

}

/* ================= UPLOAD (APPEND ONLY) ================= */
async function upload(){

  let files = file.files;

  if(!files.length){
    alert("Select images");
    return;
  }

  let urls = [];

  for(let f of files){

    let form = new FormData();
    form.append("file", f);
    form.append("upload_preset", "nipieidp");

    let res = await fetch(
      "https://api.cloudinary.com/v1_1/dahg3tht7/image/upload",
      { method:"POST", body:form }
    );

    let data = await res.json();
    urls.push(data.secure_url);
  }

  let ref = db.collection("stories").doc(user);
  let doc = await ref.get();

  let old = doc.exists ? (doc.data().images || []) : [];

  let updated = old.concat(urls);

  await ref.set({
    images: updated,
    updatedAt: Date.now()
  });

  alert("Story updated");

}

/* ================= LOAD STORIES ================= */
function loadStories(){

  db.collection("stories").onSnapshot(snap=>{

    stories.innerHTML="";

    snap.forEach(doc=>{

      let div=document.createElement("div");
      div.className="story";

      div.innerHTML=`<img src="${doc.data().images[0]}">`;

      div.onclick=()=>open(doc.data().images);

      stories.appendChild(div);
    });

  });

}

/* ================= VIEW STORY ================= */
function open(imgs){

  story = imgs;
  index = 0;

  viewer.style.display="flex";

  show();

}

function show(){
  img.src = story[index];
}

function next(){
  index++;

  if(index>=story.length){
    viewer.style.display="none";
    return;
  }

  show();
}

</script>

</body>
</html>
