<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding App 💖</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:linear-gradient(135deg,#ffe4ec,#ffd6a5);
}

/* HEADER */
header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px;
  background:white;
  overflow-x:auto;
  box-shadow:0 5px 20px rgba(0,0,0,0.08);
}

.logo{
  min-width:42px;
  height:42px;
  border-radius:50%;
  background:linear-gradient(45deg,#ff4d6d,#ffb3c1);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
}

/* TAB */
.tab{
  border:none;
  padding:8px 12px;
  border-radius:20px;
  background:#f5f5f5;
  cursor:pointer;
  white-space:nowrap;
}

.tab.active{
  background:#ff4d6d;
  color:white;
}

/* INVITATION */
.invite{
  margin:15px;
  padding:30px;
  background:linear-gradient(145deg,#fff,#fff5f8);
  border-radius:25px;
  text-align:center;
  position:relative;
  overflow:hidden;
  box-shadow:0 15px 35px rgba(0,0,0,0.15);
}

/* SNOW + SPARKLE */
.snow::before,
.snow::after{
  content:"❄ ✨ ❄ ✨ ❄ ✨ ❄ ✨ ❄ ✨";
  position:absolute;
  width:200%;
  font-size:18px;
  opacity:0.5;
  animation:fall 6s linear infinite;
}

.snow::after{
  animation-duration:9s;
  opacity:0.3;
}

@keyframes fall{
  0%{transform:translateY(-50px);}
  100%{transform:translateY(350px);}
}

/* COUPLE */
.couple{
  display:flex;
  justify-content:center;
  gap:25px;
  font-size:45px;
  margin-bottom:10px;
}

.girl{
  animation:girl 2s infinite alternate;
}

.boy{
  animation:boy 2s infinite alternate;
}

@keyframes girl{
  from{transform:translateY(0);}
  to{transform:translateY(-12px) rotate(5deg);}
}

@keyframes boy{
  from{transform:translateY(0);}
  to{transform:translateY(-12px) rotate(-5deg);}
}

.names{
  font-size:30px;
  font-weight:900;
  color:#c4004c;
}

.info{
  margin-top:10px;
  color:#444;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card{
  position:relative;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

.card img{
  width:100%;
  height:170px;
  object-fit:cover;
}

.del{
  position:absolute;
  top:5px;
  right:5px;
  background:red;
  color:white;
  border:none;
  width:25px;
  height:25px;
  border-radius:50%;
}

/* FLOAT BUTTON */
.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  width:60px;
  height:60px;
  border-radius:50%;
  background:#ff4d6d;
  color:white;
  font-size:28px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* MUSIC */
.music{
  position:fixed;
  bottom:90px;
  right:20px;
  background:black;
  color:white;
  padding:10px;
  border-radius:20px;
  font-size:12px;
}
</style>
</head>

<body>

<audio id="music" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/10/16/audio_d0c3f9d6b0.mp3?filename=romantic-110624.mp3">
</audio>

<header id="header"></header>

<!-- 💌 INVITATION -->
<div class="invite">
  <div class="snow"></div>

  <div class="couple">
    <div class="girl">👰‍♀️</div>
    <div class="boy">🤵‍♂️</div>
  </div>

  <div class="names">Sammed ❤️ Sahana</div>
  <div class="info">
    Wedding Invitation 💖<br>
    📅 June 22 • 📍 Gurukul Kalyan Mantap
  </div>
</div>

<div class="grid" id="grid"></div>

<input type="file" id="file" multiple accept="image/*" hidden>

<div class="fab" onclick="file.click()">+</div>
<div class="music" onclick="toggleMusic()">🎵 Music</div>

<script>
let data = JSON.parse(localStorage.getItem("weddingApp")) || {
  haldi:[],
  mehendi:[],
  wedding:[]
};

let current="haldi";
let music=document.getElementById("music");
let playing=false;

/* HEADER */
function renderHeader(){
  let h=document.getElementById("header");
  h.innerHTML="";

  h.innerHTML+=`<div class="logo">SS</div>`;

  Object.keys(data).forEach(k=>{
    h.innerHTML+=`
      <button class="tab ${k===current?'active':''}" onclick="switchTab('${k}')">
        ${k}
      </button>
      <span onclick="deleteSection('${k}')"
        style="color:red;cursor:pointer;">❌</span>
    `;
  });

  h.innerHTML+=`<button class="tab" onclick="addSection()">+ Add</button>`;
}

/* SWITCH */
function switchTab(k){
  current=k;
  render();
}

/* ADD */
function addSection(){
  let n=prompt("Enter section name");
  if(!n) return;

  data[n.toLowerCase()]=[];
  current=n.toLowerCase();
  save();
  render();
}

/* DELETE SECTION */
function deleteSection(k){
  if(!confirm("Delete "+k+"?")) return;
  if(!confirm("ALL photos will be deleted. Continue?")) return;

  delete data[k];
  current=Object.keys(data)[0]||"";
  save();
  render();
}

/* DELETE IMAGE */
function delImg(url){
  data[current]=data[current].filter(i=>i!==url);
  save();
  render();
}

/* RENDER */
function render(){
  renderHeader();

  let g=document.getElementById("grid");
  g.innerHTML="";

  (data[current]||[]).forEach(url=>{
    g.innerHTML+=`
      <div class="card">
        <img src="${url}">
        <button class="del" onclick="delImg('${url}')">❌</button>
      </div>
    `;
  });
}

/* UPLOAD */
file.onchange=async e=>{
  let files=[...e.target.files];

  for(let f of files){
    let form=new FormData();
    form.append("file",f);
    form.append("upload_preset","nipieidp");

    let res=await fetch("https://api.cloudinary.com/v1_1/dahg3tht7/image/upload",{
      method:"POST",
      body:form
    });

    let j=await res.json();
    data[current].push(j.secure_url);
  }

  save();
  render();
};

/* SAVE */
function save(){
  localStorage.setItem("weddingApp",JSON.stringify(data));
}

/* MUSIC */
function toggleMusic(){
  if(!playing){
    music.play().catch(()=>{});
    playing=true;
  }else{
    music.pause();
    playing=false;
  }
}

/* AUTO MUSIC START */
document.addEventListener("click",()=>{
  if(!playing){
    music.play().catch(()=>{});
    playing=true;
  }
},{once:true});

render();
</script>

</body>
</html>
