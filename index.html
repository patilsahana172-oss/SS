<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Stories</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#fafafa;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px;
  background:white;
  box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.camera{
  font-size:22px;
  background:#eee;
  padding:8px;
  border-radius:50%;
  cursor:pointer;
}

/* STORIES */
.stories{
  display:flex;
  overflow-x:auto;
  gap:12px;
  padding:12px;
  background:white;
}

.story{
  text-align:center;
}

.story img{
  width:70px;
  height:70px;
  border-radius:50%;
  padding:3px;
  background:linear-gradient(45deg,#f09433,#dc2743,#bc1888);
  object-fit:cover;
}

.story span{
  font-size:12px;
  display:block;
  margin-top:4px;
}

/* VIEWER */
#viewer{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:black;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

#viewer img{
  width:100%;
  max-height:90vh;
  object-fit:contain;
}

#viewerName{
  color:white;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="header">
  <div>Stories</div>
  <div class="camera" onclick="file.click()">📸</div>
</div>

<div class="stories" id="stories"></div>

<div id="viewer">
  <img id="img">
  <div id="viewerName"></div>
</div>

<input type="file" id="file" multiple accept="image/*" capture="environment" hidden>

<script>

/* ================= FIREBASE ================= */
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "stories-web-52ddd.firebaseapp.com",
  projectId: "stories-web-52ddd",
  storageBucket: "stories-web-52ddd.appspot.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

/* ================= CLOUDINARY ================= */
const CLOUD = "dahg3tht7";
const PRESET = "nipieidp";

/* ================= USER ================= */
let userName = localStorage.getItem("userName");
let userId = localStorage.getItem("userId");
let currentStory = null;
let index = 0;
let autoTimer;

/* create unique userId ONCE */
if (!userId) {
  userId = "user_" + Math.random().toString(36).substr(2, 9);
  localStorage.setItem("userId", userId);
}

/* ================= LOAD STORIES ================= */
db.collection("stories")
.orderBy("createdAt","desc")
.onSnapshot(snapshot => {

  let stories = [];

  snapshot.forEach(doc => {
    stories.push({ id: doc.id, ...doc.data() });
  });

  render(stories);
});

/* ================= CLOUDINARY UPLOAD ================= */
async function uploadImage(file){

  let form = new FormData();
  form.append("file",file);
  form.append("upload_preset",PRESET);

  let res = await fetch(
    `https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`,
    {method:"POST",body:form}
  );

  let data = await res.json();
  return data.secure_url;
}

/* ================= UPLOAD STORY (MERGE FIX) ================= */
file.onchange = async (e)=>{

  let files = [...e.target.files];

  if(files.length>6){
    alert("Max 6 images allowed");
    return;
  }

  if(!userName){
    userName = prompt("Enter your name:");
    localStorage.setItem("userName",userName);
  }

  let urls = [];

  for(let f of files){
    urls.push(await uploadImage(f));
  }

  const ref = db.collection("stories").doc(userId);

  const doc = await ref.get();

  let oldImages = [];

  if(doc.exists){
    oldImages = doc.data().images || [];
  }

  await ref.set({
    name:userName,
    images:[...oldImages,...urls],
    createdAt:firebase.firestore.FieldValue.serverTimestamp()
  });

  file.value="";
};

/* ================= RENDER ================= */
function render(stories){

  let c=document.getElementById("stories");
  c.innerHTML="";

  stories.forEach(s=>{

    if(!s.images || s.images.length===0) return;

    let div=document.createElement("div");
    div.className="story";

    div.innerHTML=`
      <img src="${s.images[0]}">
      <span>${s.name}</span>
    `;

    div.onclick=()=>openStory(s);

    c.appendChild(div);
  });
}

/* ================= OPEN STORY ================= */
function openStory(s){

  currentStory=s;
  index=0;

  document.getElementById("viewer").style.display="flex";
  document.getElementById("viewerName").innerText=s.name;

  show();
}

/* ================= SHOW + TAP SKIP ================= */
function show(){

  if(!currentStory) return;

  if(index>=currentStory.images.length){
    document.getElementById("viewer").style.display="none";
    return;
  }

  document.getElementById("img").src =
    currentStory.images[index];

  index++;

  clearTimeout(autoTimer);
  autoTimer = setTimeout(show,3000);
}

/* TAP = SKIP */
document.getElementById("viewer").onclick = ()=>{
  clearTimeout(autoTimer);
  show();
};

</script>

</body>
</html>
