<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insta Stories</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>

body{
  margin:0;
  font-family:system-ui;
  background:#000;
  color:white;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  padding:12px;
  background:#111;
}

.logo{
  font-weight:800;
  color:#ff2d55;
}

.icon{
  cursor:pointer;
}

/* STORIES BAR */
.stories{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px;
  background:#111;
}

.story img{
  width:60px;
  height:60px;
  border-radius:50%;
  border:2px solid #ff2d55;
}

/* VIEWER */
#viewer{
  display:none;
  position:fixed;
  inset:0;
  background:black;
  justify-content:center;
  align-items:center;
}

#viewer img{
  width:100%;
  max-height:100vh;
  object-fit:contain;
}

/* LOGIN */
.box{
  padding:20px;
}

input,button{
  padding:10px;
  margin:5px;
  width:90%;
}

/* ADMIN */
#adminPanel{
  display:none;
  background:#111;
  padding:15px;
}

.hidden{display:none}

.progress{
  position:absolute;
  top:10px;
  left:10px;
  width:90%;
  height:3px;
  background:gray;
}

.bar{
  height:3px;
  background:#ff2d55;
  width:0%;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="logo">SS Stories</div>
  <div class="icon" onclick="openAdmin()">⚙️</div>
</div>

<!-- LOGIN -->
<div id="loginBox" class="box">
  <h3>Login with OTP</h3>
  <input id="phone" placeholder="+91XXXXXXXXXX">
  <button onclick="sendOTP()">Send OTP</button>
</div>

<div id="otpBox" class="box hidden">
  <input id="otp" placeholder="Enter OTP">
  <button onclick="verifyOTP()">Verify</button>
</div>

<div id="recaptcha-container"></div>

<!-- UPLOAD -->
<div id="uploadBox" class="box hidden">
  <input type="file" id="file" multiple>
  <button onclick="uploadStory()">Upload Story</button>
</div>

<!-- STORIES -->
<div class="stories" id="stories"></div>

<!-- VIEWER -->
<div id="viewer" onclick="nextStory()">
  <div class="progress"><div class="bar" id="bar"></div></div>
  <img id="img">
</div>

<!-- ADMIN -->
<div id="adminPanel">
  <h3>Admin Panel</h3>
  <input id="cat" placeholder="Category">
  <button onclick="createCat()">Create</button>
  <div id="cats"></div>
</div>

<script>

/* 🔥 FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "PASTE_YOURS",
  authDomain: "stories-web-52ddd.firebaseapp.com",
  projectId: "stories-web-52ddd",
  storageBucket: "stories-web-52ddd.appspot.com",
  messagingSenderId: "649630516222",
  appId: "1:649630516222:web:fc99a773dfa3414ceb76af"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* STATE */
let confirmResult;
let user;
let story=[];
let index=0;

/* ================= OTP ================= */
function sendOTP(){

  let phone = document.getElementById("phone").value;

  window.recaptchaVerifier = new firebase.auth.RecaptchaVerifier(
    "recaptcha-container",
    {size:"invisible"}
  );

  auth.signInWithPhoneNumber(phone, window.recaptchaVerifier)
  .then(res=>{
    confirmResult = res;
    otpBox.classList.remove("hidden");
    alert("OTP sent");
  })
  .catch(err=>{
    alert(err.message);
  });

}

function verifyOTP(){

  let code = document.getElementById("otp").value;

  confirmResult.confirm(code)
  .then(res=>{

    user = res.user.phoneNumber;

    loginBox.style.display="none";
    otpBox.style.display="none";
    uploadBox.classList.remove("hidden");

    loadStories();

  })
  .catch(err=>{
    alert("Wrong OTP");
  });

}

/* ================= UPLOAD ================= */
async function uploadStory(){

  let files = file.files;
  let urls=[];

  for(let f of files){

    let form = new FormData();
    form.append("file",f);
    form.append("upload_preset","nipieidp");

    let res = await fetch(
      "https://api.cloudinary.com/v1_1/dahg3tht7/image/upload",
      {method:"POST",body:form}
    );

    let data = await res.json();
    urls.push(data.secure_url);
  }

  await db.collection("stories").doc(user).set({
    images:urls
  });

  alert("Uploaded");
}

/* ================= LOAD STORIES ================= */
function loadStories(){

  db.collection("stories").onSnapshot(snap=>{

    stories.innerHTML="";

    snap.forEach(doc=>{

      let div=document.createElement("div");
      div.className="story";

      div.innerHTML=`<img src="${doc.data().images[0]}">`;

      div.onclick=()=>openStory(doc.data().images);

      stories.appendChild(div);
    });

  });

}

/* ================= STORY VIEW ================= */
function openStory(imgs){

  story = imgs;
  index = 0;

  viewer.style.display="flex";

  show();
}

function show(){

  img.src = story[index];

  bar.style.width="0%";

  let t=0;

  let interval = setInterval(()=>{

    t+=2;
    bar.style.width=t+"%";

    if(t>=100){
      clearInterval(interval);
      nextStory();
    }

  },60);

}

function nextStory(){

  index++;

  if(index>=story.length){
    viewer.style.display="none";
    return;
  }

  show();
}

/* ================= ADMIN ================= */
function openAdmin(){
  adminPanel.style.display="block";
}

async function createCat(){

  await db.collection("categories").add({
    name:cat.value
  });

  loadCats();
}

function loadCats(){

  db.collection("categories").onSnapshot(snap=>{

    cats.innerHTML="";

    snap.forEach(doc=>{
      cats.innerHTML += `<div>${doc.data().name}</div>`;
    });

  });

}

</script>

</body>
</html>
