<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stories App</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#fafafa}
#authPage{text-align:center;margin-top:100px}
#homePage{display:none}

.header{display:flex;justify-content:space-between;padding:14px;background:#fff}
.camera{background:#ff3b6b;color:#fff;padding:10px;border-radius:50%}
.logout{color:red;margin-right:10px;cursor:pointer}

.stories{display:flex;overflow-x:auto;padding:10px;gap:12px}
.story img{width:70px;height:70px;border-radius:50%;border:3px solid orange}

#viewer{
display:none;position:fixed;top:0;left:0;width:100%;height:100%;
background:#000;justify-content:center;align-items:center
}
#img{width:100%;max-height:90vh}
</style>
</head>

<body>

<div id="authPage">
  <h2>Login / Signup</h2>
  <input id="email" placeholder="Email"><br><br>
  <input id="password" type="password" placeholder="Password"><br><br>
  <button id="signup">Sign Up</button>
  <button id="login">Login</button>
</div>

<div id="homePage">
  <div class="header">
    <b>Stories</b>
    <div>
      <span id="logout" class="logout">Logout</span>
      <span id="camera" class="camera">📸</span>
    </div>
  </div>

  <div id="stories" class="stories"></div>
</div>

<div id="viewer">
  <img id="img">
</div>

<input type="file" id="file" multiple accept="image/*" hidden>

<script>

/* ✅ YOUR PROJECT (stories-web-52ddd) */
const firebaseConfig = {
  apiKey: "AIzaSyBuhu2WM0jS55qnS59c87rtuVuF8TK-RkI",
  authDomain: "stories-web-52ddd.firebaseapp.com",
  projectId: "stories-web-52ddd",
  storageBucket: "stories-web-52ddd.appspot.com"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

/* CLOUDINARY */
const CLOUD = "dahg3tht7";
const PRESET = "nipieidp";

/* STATE */
let currentUser, userId, userName;

const authPage = document.getElementById("authPage");
const homePage = document.getElementById("homePage");

/* AUTH */
auth.onAuthStateChanged(async user => {

  if (!user){
    authPage.style.display = "block";
    homePage.style.display = "none";
    return;
  }

  currentUser = user;
  userId = user.uid;

  authPage.style.display = "none";
  homePage.style.display = "block";

  const ref = db.collection("stories").doc(userId);
  const snap = await ref.get();

  if (snap.exists){
    userName = snap.data().name;
  } else {
    userName = prompt("Enter your name:");
    await ref.set({
      name: userName,
      email: user.email,
      images: []
    });
  }

  loadStories();
});

/* SIGNUP */
signup.onclick = async () => {
  try {
    await auth.createUserWithEmailAndPassword(email.value, password.value);
    alert("Signup success");
  } catch (e){
    alert(e.code + " : " + e.message);
  }
};

/* LOGIN */
login.onclick = async () => {
  try {
    await auth.signInWithEmailAndPassword(email.value, password.value);
  } catch (e){
    alert(e.code + " : " + e.message);
  }
};

/* LOGOUT */
logout.onclick = () => auth.signOut();

/* LOAD STORIES */
function loadStories(){
  db.collection("stories").onSnapshot(snap => {
    let arr = [];
    snap.forEach(d => arr.push(d.data()));
    render(arr);
  });
}

/* RENDER */
function render(data){
  stories.innerHTML = "";
  data.forEach(s => {
    if (!s.images || s.images.length === 0) return;

    let div = document.createElement("div");
    div.innerHTML = `<img src="${s.images[0]}"><div>${s.name}</div>`;
    div.onclick = () => openStory(s);
    stories.appendChild(div);
  });
}

/* VIEW */
let currentStory, index=0;
function openStory(s){
  currentStory = s;
  index = 0;
  viewer.style.display = "flex";
  show();
}
function show(){
  if(index >= currentStory.images.length){
    viewer.style.display="none";
    return;
  }
  img.src = currentStory.images[index];
}
viewer.onclick = () => { index++; show(); };

/* CAMERA */
camera.onclick = () => file.click();

/* UPLOAD */
file.onchange = async e => {

  let urls = [];

  for (let f of [...e.target.files]){
    let form = new FormData();
    form.append("file", f);
    form.append("upload_preset", PRESET);

    let res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`,
      { method:"POST", body:form });

    let data = await res.json();
    urls.push(data.secure_url);
  }

  const ref = db.collection("stories").doc(userId);
  const snap = await ref.get();

  const old = snap.exists ? snap.data().images || [] : [];

  await ref.set({
    name: userName,
    email: currentUser.email,
    images: [...old, ...urls]
  });

  alert("Uploaded ✅");
};

</script>

</body>
</html>
