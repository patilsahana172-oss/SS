<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stories</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#fafafa}

.header{
  display:flex;justify-content:space-between;
  padding:14px;background:#fff;
}

.camera{
  font-size:22px;background:#ff3e6c;color:#fff;
  padding:10px;border-radius:50%;
  cursor:pointer
}

.stories{
  display:flex;overflow-x:auto;
  padding:10px;gap:12px;
}

.story{text-align:center}
.story img{
  width:70px;height:70px;border-radius:50%;
  border:3px solid orange;object-fit:cover
}

#viewer{
  display:none;position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:#000;color:#fff;
  justify-content:center;align-items:center;
  flex-direction:column
}

#img{width:100%;max-height:85vh}
</style>
</head>

<body>

<div class="header">
  <div><b>Stories</b></div>
  <div id="cameraBtn" class="camera">📸</div>
</div>

<div id="stories" class="stories"></div>

<div id="viewer">
  <img id="img">
  <div id="name"></div>
</div>

<input type="file" id="file" multiple accept="image/*" style="display:none">

<script>

/* FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyD4ADNcYbQwY2Fmzsx6HPqVDyJemDf_Acs",
  authDomain: "ss-app-a0b1c.firebaseapp.com",
  projectId: "ss-app-a0b1c"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

/* CLOUDINARY */
const CLOUD = "dahg3tht7";
const PRESET = "nipieidp";

/* STATE */
let currentUser = null;
let userId = null;
let userName = null;

/* ✅ CAMERA ALWAYS WORKS */
document.getElementById("cameraBtn").onclick = () => {
  document.getElementById("file").click();
};

/* AUTH */
auth.onAuthStateChanged(async (user) => {

  if (!user) {
    window.location.href = "index.html";
    return;
  }

  currentUser = user;
  userId = user.uid;

  const ref = db.collection("stories").doc(userId);
  const snap = await ref.get();

  if (snap.exists && snap.data().name) {
    userName = snap.data().name;
  } else {
    userName = prompt("Enter your name:");
    await ref.set({
      name: userName,
      email: user.email,
      images: []
    });
  }

  listenStories();
});

/* REALTIME */
function listenStories(){
  db.collection("stories").onSnapshot(snap => {
    let list = [];
    snap.forEach(d => list.push(d.data()));
    render(list);
  });
}

/* UI */
function render(data){
  let box = document.getElementById("stories");
  box.innerHTML = "";

  data.forEach(s => {
    if (!s.images || s.images.length === 0) return;

    let div = document.createElement("div");
    div.className = "story";

    div.innerHTML = `
      <img src="${s.images[0]}">
      <div>${s.name}</div>
    `;

    div.onclick = () => openStory(s);
    box.appendChild(div);
  });
}

/* VIEW STORY */
let index = 0, currentStory;

function openStory(s){
  currentStory = s;
  index = 0;
  viewer.style.display = "flex";
  name.innerText = s.name;
  show();
}

function show(){
  if(index >= currentStory.images.length){
    viewer.style.display = "none";
    return;
  }
  img.src = currentStory.images[index];

  setTimeout(()=>{
    index++;
    show();
  },2000);
}

viewer.onclick = () => {
  index++;
  show();
};

/* UPLOAD */
document.getElementById("file").onchange = async (e) => {

  let files = [...e.target.files];
  if (!files.length) return;

  if (!currentUser) {
    alert("Login not ready");
    return;
  }

  try {

    let urls = [];

    for (let f of files) {

      let form = new FormData();
      form.append("file", f);
      form.append("upload_preset", PRESET);

      let res = await fetch(
        `https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`,
        { method: "POST", body: form }
      );

      let data = await res.json();

      if (!data.secure_url) {
        alert("Upload failed");
        return;
      }

      urls.push(data.secure_url);
    }

    await db.collection("stories").doc(userId).set({
      name: userName,
      email: currentUser.email,
      images: urls
    });

    alert("Uploaded ✅");

  } catch (err) {
    console.error(err);
    alert("Error ❌");
  }
};

</script>

</body>
</html>
